/* ═══ URL STATE SHARING ═══ */
function encodeState(drivers, g, kpis, removedKpis) {
  const state = { d: drivers, g, k: kpis, r: removedKpis };
  const json = JSON.stringify(state);
  try { return btoa(unescape(encodeURIComponent(json))); } catch(e) { return null; }
}
function decodeState(encoded) {
  try {
    const json = decodeURIComponent(escape(atob(encoded)));
    return JSON.parse(json);
  } catch(e) { return null; }
}
function getURLConfig() {
  const params = new URLSearchParams(window.location.search);
  const cfg = params.get("config");
  if (!cfg) return null;
  return decodeState(cfg);
}
function generateShareURL(drivers, g, kpis, removedKpis) {
  const encoded = encodeState(drivers, g, kpis, removedKpis);
  if (!encoded) return null;
  const base = window.location.origin + window.location.pathname;
  return base + "?config=" + encoded;
}

function calcDriver(d, hr, af) {
  if (!d.enabled) return 0; const i=d.inputs;
  switch (d.type) {
    case "time": return i.people*i.hoursPerCycle*i.cyclesPerYear*hr*i.reduction*af;
    case "incident": return i.people*i.hoursPerIncident*i.incidentsPerYear*hr*i.recapture*af;
    case "risk": return (i.costPerIncident*i.probCurrent)-(i.costPerIncident*i.probWrike);
    case "revenue": return i.annualValue*i.improvement*af;
    default: return 0;
  }
}
function calcCoi(d, hr) {
  if (!d.enabled) return 0; const i=d.inputs;
  switch (d.type) {
    case "time": return i.people*i.hoursPerCycle*i.cyclesPerYear*hr;
    case "incident": return i.people*i.hoursPerIncident*i.incidentsPerYear*hr;
    case "risk": return i.costPerIncident*i.probCurrent;
    case "revenue": return i.annualValue*i.improvement;
    default: return 0;
  }
}

  /* Row 1: Title bar */
  for(let i=0;i<=tCol;i++)sc(ws2,r,i,"",S.hdr);
  sc(ws2,r,0,"WRIKE VALUE MODEL — "+H+"-YEAR PROJECTION",S.hdr);r++;
  
  /* Row 2: Year headers with green fill */
  sc(ws2,r,0,"",{fill:{fgColor:{rgb:"334155"}}});
  for(let i=0;i<H;i++)sc(ws2,r,i+1,"Year "+(i+1),S.yrH);
  sc(ws2,r,tCol,"Total",S.totH);r++;
  
  /* COSTS section header */
  sc(ws2,r,0,"COSTS",S.secR);for(let i=1;i<=tCol;i++)sc(ws2,r,i,"",S.secR);r++;
  
  /* Cost rows with formulas */
  sc(ws2,r,0,"Wrike Licenses",S.lbl);
  for(let i=0;i<H;i++)sf(ws2,r,i+1,"="+aRef["wrikeCost"+i],S.$);
  sf(ws2,r,tCol,"=SUM("+cn(1)+(r+1)+":"+cn(H)+(r+1)+")",S.$);r++;
  
  sc(ws2,r,0,"Prof Services",S.lbl);
  sf(ws2,r,1,"="+aRef.profSvc,S.$);for(let i=1;i<H;i++)sc(ws2,r,i+1,0,S.$);
  sf(ws2,r,tCol,"=SUM("+cn(1)+(r+1)+":"+cn(H)+(r+1)+")",S.$);r++;
  
  sc(ws2,r,0,"Migration",S.lbl);
  sf(ws2,r,1,"="+aRef.migration,S.$);for(let i=1;i<H;i++)sc(ws2,r,i+1,0,S.$);
  sf(ws2,r,tCol,"=SUM("+cn(1)+(r+1)+":"+cn(H)+(r+1)+")",S.$);r++;
  
  sc(ws2,r,0,"Additional SKUs",S.lbl);
  for(let i=0;i<H;i++)sc(ws2,r,i+1,skuTot,S.$);
  sf(ws2,r,tCol,"=SUM("+cn(1)+(r+1)+":"+cn(H)+(r+1)+")",S.$);r++;
  
  const costTop=r-3;
  /* TOTAL COST - highlighted row */
  sc(ws2,r,0,"TOTAL COST",{font:{bold:true,sz:10,color:{rgb:"DC2626"},name:"Arial"},fill:{fgColor:{rgb:"FEF2F2"}}});
  for(let i=0;i<H;i++)sf(ws2,r,i+1,"=SUM("+cn(i+1)+(costTop+1)+":"+cn(i+1)+r+")",S.totRbg);
  sf(ws2,r,tCol,"=SUM("+cn(1)+(r+1)+":"+cn(H)+(r+1)+")",S.totRbg);
  const tcRow=r;r+=2;
  
  /* BENEFITS section header */
  sc(ws2,r,0,"BENEFITS",S.secG);for(let i=1;i<=tCol;i++)sc(ws2,r,i,"",S.secG);r++;
  
  sc(ws2,r,0,"Adoption Factor",S.lbl);
  sf(ws2,r,1,"=MAX(0,(12-"+aRef.adoptionRamp+")/12)",S.p);
  for(let i=1;i<H;i++)sc(ws2,r,i+1,1,S.p);
  const afRow=r;r++;
  
  sc(ws2,r,0,"Hourly Rate (calculated)",S.lbl);
  for(let i=0;i<H;i++)sf(ws2,r,i+1,"="+aRef.fteCost+"/2080",S.hr);
  const hrRow=r;r+=2;
  
  /* Driver rows */
  const dRows=[];
  el.forEach((d,di)=>{
    sc(ws2,r,0,d.name,S.drv(d.color));r++;
    sc(ws2,r,0,d.name+" Savings",S.lbl);
    for(let yi=0;yi<H;yi++){
      const c=yi+1;const af=cn(c)+(afRow+1);const hrc=cn(c)+(hrRow+1);
      let f="";
      if(d.type==="time")f="="+aRef["d"+di+"_people"]+"*"+aRef["d"+di+"_hoursPerCycle"]+"*"+aRef["d"+di+"_cyclesPerYear"]+"*"+hrc+"*"+aRef["d"+di+"_reduction"]+"*"+af;
      else if(d.type==="incident")f="="+aRef["d"+di+"_people"]+"*"+aRef["d"+di+"_hoursPerIncident"]+"*"+aRef["d"+di+"_incidentsPerYear"]+"*"+hrc+"*"+aRef["d"+di+"_recapture"]+"*"+af;
      else if(d.type==="risk")f="=("+aRef["d"+di+"_costPerIncident"]+"*"+aRef["d"+di+"_probCurrent"]+")-("+aRef["d"+di+"_costPerIncident"]+"*"+aRef["d"+di+"_probWrike"]+")";
      else if(d.type==="revenue")f="="+aRef["d"+di+"_annualValue"]+"*"+aRef["d"+di+"_improvement"]+"*"+af;
      sf(ws2,r,c,f,S.$);
    }
    sf(ws2,r,tCol,"=SUM("+cn(1)+(r+1)+":"+cn(H)+(r+1)+")",S.tot);
    dRows.push(r);r++;
  });
  
  r++;
  sc(ws2,r,0,"LEGACY TOOL(S) SAVINGS",S.drv("#10b981"));r++;
  sc(ws2,r,0,"Legacy Tool Savings",S.lbl);
  for(let i=0;i<H;i++)sf(ws2,r,i+1,"="+aRef.legacyFull+"-"+aRef["phaseDown"+i],S.$);
  sf(ws2,r,tCol,"=SUM("+cn(1)+(r+1)+":"+cn(H)+(r+1)+")",S.tot);
  const lsRow=r;r+=2;
  
  sc(ws2,r,0,"FTE AVOIDANCE",S.drv("#059669"));r++;
  sc(ws2,r,0,"FTE Avoidance",S.lbl);
  if(g.fteAvoidY1)sf(ws2,r,1,"="+aRef.fteAvoided+"*"+aRef.fteCost+"*"+cn(1)+(afRow+1),S.$);
  else sc(ws2,r,1,0,S.$);
  for(let i=1;i<H;i++)sf(ws2,r,i+1,"="+aRef.fteAvoided+"*"+aRef.fteCost,S.$);
  sf(ws2,r,tCol,"=SUM("+cn(1)+(r+1)+":"+cn(H)+(r+1)+")",S.tot);
  const feRow=r;r+=2;
  
  /* TOTAL BENEFIT - highlighted */
  sc(ws2,r,0,"TOTAL BENEFIT",{font:{bold:true,sz:10,color:{rgb:"059669"},name:"Arial"},fill:{fgColor:{rgb:"F0FDF4"}}});
  for(let i=0;i<H;i++){
    const parts=[...dRows.map(dr=>cn(i+1)+(dr+1)),cn(i+1)+(lsRow+1),cn(i+1)+(feRow+1)];
    sf(ws2,r,i+1,"="+parts.join("+"),S.totGbg);
  }
  sf(ws2,r,tCol,"=SUM("+cn(1)+(r+1)+":"+cn(H)+(r+1)+")",S.totGbg);
  const tbRow=r;r+=2;
  
  /* NET ANALYSIS */
  sc(ws2,r,0,"NET ANALYSIS",S.sec);for(let i=1;i<=tCol;i++)sc(ws2,r,i,"",S.sec);r++;
  sc(ws2,r,0,"Net Benefit",S.bold);
  for(let i=0;i<H;i++)sf(ws2,r,i+1,"="+cn(i+1)+(tbRow+1)+"-"+cn(i+1)+(tcRow+1),S.tot);
  sf(ws2,r,tCol,"=SUM("+cn(1)+(r+1)+":"+cn(H)+(r+1)+")",S.tot);
  r+=3;
  
  /* SUMMARY */
  sc(ws2,r,0,"SUMMARY",S.sec);sc(ws2,r,1,"",S.sec);r++;
  sc(ws2,r,0,g.discountEnabled?"Net Present Value":"Net Value",S.bold);sc(ws2,r,1,Math.round(model.npv),model.npv>=0?S.tot:S.totR);r++;
  sc(ws2,r,0,"Total ROI",S.bold);sc(ws2,r,1,model.roi,{font:{bold:true,sz:10,color:{rgb:"059669"},name:"Arial"},numFmt:"0.0%",alignment:{horizontal:"right"}});r++;
  sc(ws2,r,0,"Payback",S.bold);sc(ws2,r,1,model.pbm?model.pbm+" months":"N/A",S.bold);r++;
  
  ws2["!ref"]="A1:"+cn(tCol)+(r+1);
  XLSX.utils.book_append_sheet(wb,ws2,H+"-Year Model");
  
  /* ═══ TAB 3: COST OF INACTION ═══ */
  const ws3={};r=0;
  ws3["!cols"]=[{wch:35},...Array(H).fill({wch:15}),{wch:15}];
  for(let i=0;i<=tCol;i++)sc(ws3,r,i,"",S.hdr);
  sc(ws3,r,0,"COST OF INACTION — WHAT HAPPENS IF YOU DO NOTHING?",S.hdr);r++;
  sc(ws3,r,0,"",{fill:{fgColor:{rgb:"334155"}}});
  for(let i=0;i<H;i++)sc(ws3,r,i+1,"Year "+(i+1),S.yrH);
  sc(ws3,r,tCol,"Total",{font:{bold:true,sz:10,color:{rgb:"FFFFFF"},name:"Arial"},fill:{fgColor:{rgb:"DC2626"}},alignment:{horizontal:"right"}});r++;
  
  const coiItems=[
    ["Legacy Tools (full cost)","coiSS"],
  ];
  coiItems.forEach(([label,k])=>{
    sc(ws3,r,0,label,S.lbl);
    for(let i=0;i<H;i++)sc(ws3,r,i+1,Math.round(model.years[Math.min(i,model.years.length-1)][k]),S.$);
    sf(ws3,r,tCol,"=SUM("+cn(1)+(r+1)+":"+cn(H)+(r+1)+")",S.totR);r++;
  });
  /* Per-driver cost of inaction lines */
  el.forEach(d=>{
    const coiLabel=d.type==="risk"?"compliance risk exposure":d.type==="revenue"?"unrealized revenue":d.type==="incident"?"incident recovery cost":"wasted productivity";
    sc(ws3,r,0,d.name+" ("+coiLabel+")",S.lbl);
    for(let i=0;i<H;i++){
      const yData=model.years[Math.min(i,model.years.length-1)];
      sc(ws3,r,i+1,Math.round(yData.coiByDriver?yData.coiByDriver[d.id]||0:0),S.$);
    }
    sf(ws3,r,tCol,"=SUM("+cn(1)+(r+1)+":"+cn(H)+(r+1)+")",S.totR);r++;
  });
  /* Additional FTEs */
  sc(ws3,r,0,"Additional FTEs for Growth",S.lbl);
  for(let i=0;i<H;i++)sc(ws3,r,i+1,Math.round(model.years[Math.min(i,model.years.length-1)].coiFTE),S.$);
  sf(ws3,r,tCol,"=SUM("+cn(1)+(r+1)+":"+cn(H)+(r+1)+")",S.totR);r++;
  
  /* Total row - highlighted */
  sc(ws3,r,0,"TOTAL COST OF INACTION",{font:{bold:true,sz:10,color:{rgb:"DC2626"},name:"Arial"},fill:{fgColor:{rgb:"FEF2F2"}}});
  for(let i=0;i<H;i++)sf(ws3,r,i+1,"=SUM("+cn(i+1)+"3:"+cn(i+1)+r+")",S.totRbg);
  sf(ws3,r,tCol,"=SUM("+cn(1)+(r+1)+":"+cn(H)+(r+1)+")",S.totRbg);r+=2;
  
  /* Bottom line */
  const annualCOI=Math.round(model.coiTotal/H);
  sc(ws3,r,0,"Every year you wait, $"+annualCOI.toLocaleString()+" is lost to inefficiency, risk, and tools that aren't working.",S.bold);r++;
  sc(ws3,r,0,"Over "+H+" years, that's $"+Math.round(model.coiTotal).toLocaleString()+" walking out the door.",{font:{bold:true,sz:10,color:{rgb:"DC2626"},name:"Arial"}});r++;
  sc(ws3,r,0,"Wrike pays for itself in "+(model.pbm?model.pbm+" months":"under a year")+".",{font:{bold:true,sz:10,color:{rgb:"059669"},name:"Arial"}});r++;
  
  ws3["!ref"]="A1:"+cn(tCol)+(r+1);
  XLSX.utils.book_append_sheet(wb,ws3,"Cost of Inaction");
  
  /* ═══ TAB 4: SOURCES & KPIs ═══ */
  const ws4={};r=0;
  ws4["!cols"]=[{wch:42},{wch:45}];
  sc(ws4,r,0,"SOURCES & POST-IMPLEMENTATION KPIs",S.hdr);sc(ws4,r,1,"",S.hdr);r+=2;
  sc(ws4,r,0,"RISK BENCHMARK SOURCES",S.sec);sc(ws4,r,1,"",S.sec);r++;
  [["IBM/Ponemon Cost of a Data Breach 2025","hipaajournal.com"],["HHS OCR Resolution Agreements","hhs.gov"],["HIPAA Violation Penalty Tiers 2025","accountablehq.com"],["Healthcare avg: $7.42M/breach","IBM Security, July 2025"]].forEach(([a,b])=>{sc(ws4,r,0,a,S.lbl);sc(ws4,r,1,b,S.note);r++;});
  r++;
  sc(ws4,r,0,"POST-IMPLEMENTATION KPIs",S.sec);sc(ws4,r,1,"",S.sec);r++;
  const allKpis=[...new Set(drivers.filter(d=>d.enabled).flatMap(d=>d.kpis||[]))];
  allKpis.forEach(k=>{sc(ws4,r,0,k,S.lbl);sc(ws4,r,1,"Track quarterly",S.note);r++;});
  ws4["!ref"]="A1:B"+(r+1);
  XLSX.utils.book_append_sheet(wb,ws4,"Sources & KPIs");
  
  XLSX.writeFile(wb,`Wrike_Value_Model${g.customerName?" - "+g.customerName:""}.xlsx`);
}

/* ── UI ── */
function Tip({text}){const[show,setShow]=useState(false);if(!text)return null;return(
  <span style={{position:"relative",display:"inline-block",marginLeft:5,cursor:"pointer"}} onMouseEnter={()=>setShow(true)} onMouseLeave={()=>setShow(false)} onClick={()=>setShow(!show)}>
    <span style={{display:"inline-flex",alignItems:"center",justifyContent:"center",width:15,height:15,borderRadius:"50%",background:"#e2e8f0",color:"#475569",fontSize:9,fontWeight:700}}>?</span>
    {show&&<div style={{position:"absolute",bottom:22,left:"50%",transform:"translateX(-50%)",width:260,background:"#1e293b",color:"#f1f5f9",padding:"10px 12px",borderRadius:8,fontSize:11,lineHeight:1.5,zIndex:999,boxShadow:"0 8px 24px rgba(0,0,0,0.25)",fontWeight:400,pointerEvents:"none"}}>
      <div style={{position:"absolute",bottom:-5,left:"50%",transform:"translateX(-50%) rotate(45deg)",width:10,height:10,background:"#1e293b"}}/>{text}
    </div>}
  </span>);
}
function Inp({label,value,onChange,prefix,suffix,step=1,min=0,help,placeholder}){return(
  <div style={{marginBottom:6}}>
    <div style={{display:"flex",alignItems:"center",marginBottom:2}}>
      <label style={{fontSize:10,fontWeight:600,color:"#64748b",letterSpacing:"0.02em"}}>{label}</label>{help&&<Tip text={help}/>}
    </div>
    <div style={{display:"flex",alignItems:"center",gap:3}}>
      {prefix&&<span style={{fontSize:12,color:"#475569",fontWeight:600}}>{prefix}</span>}
      <input type={placeholder?"text":"number"} value={value} onChange={e=>onChange(placeholder?e.target.value:Number(e.target.value))} step={step} min={min} placeholder={placeholder}
        style={{width:"100%",padding:"5px 8px",border:"1px solid #cbd5e1",borderRadius:5,fontSize:12,fontFamily:placeholder?"'DM Sans',sans-serif":"'JetBrains Mono',monospace",color:"#1e293b",background:"#f8fafc",outline:"none"}}
        onFocus={e=>e.target.style.borderColor="#3b82f6"} onBlur={e=>e.target.style.borderColor="#cbd5e1"}/>
      {suffix&&<span style={{fontSize:10,color:"#64748b",whiteSpace:"nowrap"}}>{suffix}</span>}
    </div>
  </div>);
}
function Sld({label,value,onChange,min,max,step=1,format="num",help}){const d=format==="pct"?pct(value):value;return(
  <div style={{marginBottom:7}}>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:2}}>
      <div style={{display:"flex",alignItems:"center"}}><label style={{fontSize:10,fontWeight:600,color:"#64748b"}}>{label}</label>{help&&<Tip text={help}/>}</div>
      <span style={{fontSize:12,fontWeight:700,color:"#1e293b",fontFamily:"'JetBrains Mono',monospace"}}>{d}</span>
    </div>
    <input type="range" min={min} max={max} step={step} value={value} onChange={e=>onChange(Number(e.target.value))} style={{width:"100%",accentColor:"#3b82f6",height:3}}/>
  </div>);
}
function Stat({label,value,sub,color="#1e293b",bg="#f1f5f9"}){return(
  <div style={{background:bg,borderRadius:8,padding:"10px 12px",flex:1,minWidth:115}}>
    <div style={{fontSize:9,fontWeight:700,color:"#64748b",textTransform:"uppercase",letterSpacing:"0.04em",marginBottom:3}}>{label}</div>
    <div style={{fontSize:20,fontWeight:800,color,fontFamily:"'JetBrains Mono',monospace",lineHeight:1.1}}>{value}</div>
    {sub&&<div style={{fontSize:9,color:"#94a3b8",marginTop:2}}>{sub}</div>}
  </div>);
}

function DriverInputs({driver,onChange}){
  const ui=(f)=>(v)=>onChange({...driver,inputs:{...driver.inputs,[f]:v}});
  const i=driver.inputs,l=driver.labels||{},h=driver.helps||{};
  const ft=FORMULA_TYPES.find(f=>f.v===driver.type);
  switch(driver.type){
    case "time": return(<>
      <Inp label={l.people||"Team Size"} value={i.people} onChange={ui("people")} suffix="people" help={h.people}/>
      <Inp label={l.hoursPerCycle||"Hours / Cycle / Person"} value={i.hoursPerCycle} onChange={ui("hoursPerCycle")} suffix="hrs" step={0.5} help={h.hoursPerCycle}/>
      <div style={{marginBottom:6}}>
        <div style={{display:"flex",alignItems:"center",marginBottom:2}}><label style={{fontSize:10,fontWeight:600,color:"#64748b"}}>Frequency</label></div>
        <select value={[52,26,12,4,1].includes(i.cyclesPerYear)?String(i.cyclesPerYear):"custom"} onChange={e=>{const v=e.target.value;if(v==="custom"){ui("cyclesPerYear")(10);return;}ui("cyclesPerYear")(Number(v));}}
          style={{width:"100%",padding:"5px 8px",border:"1px solid #cbd5e1",borderRadius:5,fontSize:12,color:"#1e293b",background:"#f8fafc",outline:"none",marginBottom:3}}>
          <option value="52">Weekly (52/yr)</option><option value="26">Bi-weekly (26/yr)</option><option value="12">Monthly (12/yr)</option><option value="4">Quarterly (4/yr)</option><option value="1">Annual (1/yr)</option><option value="custom">Custom</option>
        </select>
        {![52,26,12,4,1].includes(i.cyclesPerYear)&&<Inp label="Custom Cycles / Year" value={i.cyclesPerYear} onChange={ui("cyclesPerYear")} min={1}/>}
      </div>
      <Sld label={l.reduction||"% Reduction"} value={i.reduction} onChange={ui("reduction")} min={0.05} max={0.95} step={0.05} format="pct" help={h.reduction}/>
    </>);
    case "incident": return(<>
      <Inp label={l.people||"People Affected"} value={i.people} onChange={ui("people")} suffix="people" help={h.people}/>
      <Inp label={l.hoursPerIncident||"Hours / Person / Incident"} value={i.hoursPerIncident} onChange={ui("hoursPerIncident")} suffix="hrs" step={0.5} help={h.hoursPerIncident}/>
      <Inp label={l.incidentsPerYear||"Incidents / Year"} value={i.incidentsPerYear} onChange={ui("incidentsPerYear")} help={h.incidentsPerYear}/>
      <Sld label={l.recapture||"Recapture Rate"} value={i.recapture} onChange={ui("recapture")} min={0.05} max={1} step={0.05} format="pct" help={h.recapture}/>
    </>);
    case "risk": return(<>
      <Inp label={l.costPerIncident||"Cost Per Incident"} value={i.costPerIncident} onChange={ui("costPerIncident")} prefix="$" help={h.costPerIncident}/>
      <Sld label={l.probCurrent||"Probability Today"} value={i.probCurrent} onChange={ui("probCurrent")} min={0.01} max={0.3} step={0.01} format="pct" help={h.probCurrent}/>
      <Sld label={l.probWrike||"Probability with Wrike"} value={i.probWrike} onChange={ui("probWrike")} min={0} max={0.2} step={0.01} format="pct" help={h.probWrike}/>
    </>);
    case "revenue": return(<>
      <Inp label={l.annualValue||"Annual Revenue / Value at Risk"} value={i.annualValue} onChange={ui("annualValue")} prefix="$" help={h.annualValue}/>
      <Sld label={l.improvement||"% Improvement"} value={i.improvement} onChange={ui("improvement")} min={0.01} max={0.5} step={0.01} format="pct" help={h.improvement}/>
    </>);
    default: return null;
  }
}

/* ── Modals ── */
function Modal({children,onClose,wide}){return(
  <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.5)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:1000}} onClick={onClose}>
    <div style={{background:"white",borderRadius:12,padding:24,width:wide?560:400,maxHeight:"85vh",overflowY:"auto",boxShadow:"0 20px 60px rgba(0,0,0,0.3)"}} onClick={e=>e.stopPropagation()}>{children}</div>
  </div>);
}

function EditDriverModal({driver,onSave,onClose,onDelete}){
  const[d,setD]=useState(JSON.parse(JSON.stringify(driver)));
  const changeType=(t)=>{if(t===d.type)return;const ft=FORMULA_TYPES.find(f=>f.v===t);setD(p=>({...p,type:t,inputs:{...ft.defaults},labels:{...ft.labels}}));};
  return(<Modal onClose={onClose}>
    <div style={{fontSize:16,fontWeight:700,marginBottom:16}}>Edit Value Driver</div>
    <div style={{marginBottom:10}}><label style={{fontSize:11,fontWeight:600,color:"#64748b",display:"block",marginBottom:4}}>Name</label>
      <input value={d.name} onChange={e=>setD({...d,name:e.target.value})} style={{width:"100%",padding:"8px 10px",border:"1px solid #cbd5e1",borderRadius:6,fontSize:13,outline:"none",boxSizing:"border-box"}}/></div>
    <div style={{marginBottom:10}}><label style={{fontSize:11,fontWeight:600,color:"#64748b",display:"block",marginBottom:4}}>Description</label>
      <textarea value={d.tip||""} onChange={e=>setD({...d,tip:e.target.value})} rows={2} style={{width:"100%",padding:"8px 10px",border:"1px solid #cbd5e1",borderRadius:6,fontSize:12,outline:"none",resize:"vertical",boxSizing:"border-box"}}/></div>
    <div style={{marginBottom:12}}><label style={{fontSize:11,fontWeight:600,color:"#64748b",display:"block",marginBottom:6}}>Formula Type <span style={{fontWeight:400,color:"#94a3b8",fontSize:10}}>- changing resets inputs</span></label>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:4}}>
        {FORMULA_TYPES.map(ft=>(<button key={ft.v} onClick={()=>changeType(ft.v)} style={{padding:"6px 8px",border:d.type===ft.v?"2px solid #3b82f6":"1px solid #e2e8f0",borderRadius:6,cursor:"pointer",background:d.type===ft.v?"#eff6ff":"white",textAlign:"left"}}>
          <div style={{fontSize:11,fontWeight:600,color:"#1e293b"}}>{ft.l}</div><div style={{fontSize:9,color:"#64748b",marginTop:1}}>{ft.d}</div>
        </button>))}
      </div>
    </div>
    <div style={{display:"flex",gap:8,justifyContent:"space-between"}}>
      {onDelete&&<button onClick={onDelete} style={{padding:"8px 14px",border:"1px solid #fecaca",borderRadius:6,background:"#fef2f2",cursor:"pointer",fontSize:12,fontWeight:600,color:"#dc2626"}}>Delete</button>}

/* ══════ MAIN ══════ */
function App(){
  const urlConfig = useMemo(() => getURLConfig(), []);
  const[drivers,setDrivers]=useState(urlConfig?.d || []);
  const[g,setG]=useState(urlConfig?.g ? {...DEFAULT_GLOBALS, ...urlConfig.g} : DEFAULT_GLOBALS);
  const[scenarios,setScenarios]=useState(DEFAULT_SCENARIOS);
  const[tab,setTab]=useState("drivers");
  const[showLibrary,setShowLibrary]=useState(false);
  const[editingDriver,setEditingDriver]=useState(null);
  const[editingScenario,setEditingScenario]=useState(null);
  const[addingScenario,setAddingScenario]=useState(false);
  const[kpis,setKpis]=useState(urlConfig?.k || []);
  const[removedKpis,setRemovedKpis]=useState(urlConfig?.r || {});
  const[panelOpen,setPanelOpen]=useState(!urlConfig);
  const[openSections,setOpenSections]=useState(()=>{
    const m={}; if(urlConfig?.d) urlConfig.d.forEach((d,i)=>m[d.id]=i===0); return m;
  });
  const[shareModal,setShareModal]=useState(false);
  const[toast,setToast]=useState("");
  React.useEffect(()=>{if(toast){const t=setTimeout(()=>setToast(""),3000);return()=>clearTimeout(t);}},[toast]);
  const[showModels,setShowModels]=useState(false);
  const[savedModels,setSavedModels]=useState(()=>{try{return JSON.parse(localStorage.getItem("wrike_models")||"[]");}catch(e){return[];}});
  const[shareURL,setShareURL]=useState("");
  _cur=g.currency||"$";
  const editMode=true;
  const ug=(k)=>(v)=>setG(p=>({...p,[k]:v}));
  const ts=(id)=>setOpenSections(p=>({...p,[id]:!p[id]}));
  const setPhaseDown=(yr,val)=>setG(p=>{const a=[...p.legacyPhaseDown];a[yr]=val;return{...p,legacyPhaseDown:a};});
  const setWrikeCost=(yr,val)=>setG(p=>{const a=[...p.wrikeCostByYear];a[yr]=val;return{...p,wrikeCostByYear:a};});

  const saveModel=()=>{
    const name=g.customerName||"Untitled Model";
    const model_data={name,date:new Date().toISOString().split("T")[0],d:drivers,g,k:kpis,r:removedKpis};
    const existing=savedModels.findIndex(m=>m.name===name);
    let updated;
    if(existing>=0){updated=[...savedModels];updated[existing]=model_data;}
    else{updated=[...savedModels,model_data];}
    setSavedModels(updated);
    try{localStorage.setItem("wrike_models",JSON.stringify(updated));}catch(e){}
  };
  const loadModel=(m)=>{
    setDrivers(m.d||[]);setG({...DEFAULT_GLOBALS,...(m.g||{})});setKpis(m.k||[]);setRemovedKpis(m.r||{});
    const ns={};(m.d||[]).forEach((d,i)=>ns[d.id]=i===0);setOpenSections(ns);
    setShowModels(false);
  };
  const deleteModel=(idx)=>{
    const updated=savedModels.filter((_,i)=>i!==idx);
    setSavedModels(updated);
    try{localStorage.setItem("wrike_models",JSON.stringify(updated));}catch(e){}
  };
  const exportJSON=()=>{
    const data={name:g.customerName||"Model",date:new Date().toISOString().split("T")[0],d:drivers,g,k:kpis,r:removedKpis};
    const blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
    const url=URL.createObjectURL(blob);const a=document.createElement("a");
    a.href=url;a.download=`Wrike_Model_${g.customerName||"export"}.json`;a.click();URL.revokeObjectURL(url);
  };
  const importJSON=(e)=>{
    const file=e.target.files[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=(ev)=>{try{const data=JSON.parse(ev.target.result);if(Array.isArray(data)){const updated=[...savedModels,...data];setSavedModels(updated);try{localStorage.setItem("wrike_models",JSON.stringify(updated));}catch(e){}setToast("Imported "+data.length+" models");}else{loadModel(data);}}catch(err){alert("Invalid file");}};
    reader.readAsText(file);
  };

  /* Auto-map KPIs from active drivers */
  const mappedKpis = useMemo(()=>{
    const driverKpis = drivers.filter(d=>d.enabled).flatMap(d=>d.kpis||[]).filter(k=>!removedKpis[k]);
    return [...new Set([...driverKpis,...kpis])];
  },[drivers,kpis,removedKpis]);

  const model = useMemo(()=>{
    const hr=g.fteCost/2080;const dr=g.discountEnabled?g.discountRate:0;
    const years=[];const el=drivers.filter(d=>d.enabled);
    for(let y=1;y<=g.horizon;y++){
      const af=y===1?Math.max(0,(12-g.adoptionRamp)/12):1;
      const lv={};let tlb=0;el.forEach(d=>{const v=calcDriver(d,hr,af);lv[d.id]=v;tlb+=v;});
      const ssSav=g.legacyFullCost-(g.legacyPhaseDown[y-1]||0);
      const fteSav=y===1?(g.fteAvoidY1?g.fteAvoided*g.fteCost*af:0):g.fteAvoided*g.fteCost;
      const legacySav=Math.max(0,ssSav);
      const l4=legacySav+fteSav;
      const wLicCost=g.wrikeCostByYear[y-1]||0;
      const wProf=y===1?g.wrikeProfServices:0;const wMig=y===1?g.wrikeMigration:0;
      const wSKUs=g.wrikeAdditionalSKUs.reduce((a,s)=>a+(s.annual||0),0);
      const totalCost=wLicCost+wProf+wMig+wSKUs;const totalBenefit=tlb+l4;const net=totalBenefit-totalCost;
      const df=1/Math.pow(1+dr,y);
      let coiL=0;const coiByDriver={};el.forEach(d=>{const cv=calcCoi(d,hr);coiByDriver[d.id]=cv;coiL+=cv;});
      const coiLegacy=g.legacyFullCost||0;
      const coiTotal=coiLegacy+coiL+(y>1||g.fteAvoidY1?g.fteAvoided*g.fteCost:0);
      years.push({year:y,af,lv,l4,legacySav,totalCost,totalBenefit,net,df,pvNet:net*df,wLicCost,wProf,wMig,wSKUs,ssSav,fteSav,coiTotal,coiSS:coiLegacy,coiL,coiByDriver,coiFTE:y>1||g.fteAvoidY1?g.fteAvoided*g.fteCost:0});
    }
    const npv=years.reduce((a,y)=>a+y.pvNet,0);const tc=years.reduce((a,y)=>a+y.totalCost,0);const tb=years.reduce((a,y)=>a+y.totalBenefit,0);
    const roi=tc>0?(tb-tc)/tc:0;
    let cum=0,pbm=null;for(const y of years){const mn=y.net/12;for(let m=1;m<=12;m++){cum+=mn;if(cum>=0&&!pbm)pbm=(y.year-1)*12+m;}}
    const lt={};el.forEach(d=>{lt[d.id]=years.reduce((a,y)=>a+(y.lv[d.id]||0),0);});lt._l4=years.reduce((a,y)=>a+y.legacySav,0);
    lt._fte=years.reduce((a,y)=>a+y.fteSav,0);
    const coiTotal=years.reduce((a,y)=>a+y.coiTotal,0);
    return{years,npv,tc,tb,roi,pbm,lt,coiTotal};
  },[drivers,g]);

  const scenarioResults=useMemo(()=>{
    return scenarios.filter(s=>s.enabled).map(sc=>{
      const sg={...g,...sc.overrides.globalOverrides};const dr=sg.discountEnabled?sg.discountRate:0;
      const sD=drivers.map(d=>{const lo=sc.overrides.leverOverrides[d.id]||{};const lio=sc.overrides.leverInputOverrides[d.id]||{};return{...d,...lo,inputs:{...d.inputs,...lio}};}).filter(d=>d.enabled);
      let tC=0,tB=0,npvS=0;
      for(let y=1;y<=sg.horizon;y++){
        const af=y===1?Math.max(0,(12-sg.adoptionRamp)/12):1;const shr=sg.fteCost/2080;
        let lb=0;sD.forEach(d=>lb+=calcDriver(d,shr,af));
        const ssS=sg.legacyFullCost-(sg.legacyPhaseDown?sg.legacyPhaseDown[y-1]||0:0);const fS=y===1?(sg.fteAvoidY1?sg.fteAvoided*sg.fteCost*af:0):sg.fteAvoided*sg.fteCost;
        const b=lb+ssS+fS;const wC=sg.wrikeCostByYear[y-1]||0;
        const skus=sg.wrikeAdditionalSKUs?sg.wrikeAdditionalSKUs.reduce((a,s)=>a+(s.annual||0),0):0;
        const c=wC+(y===1?sg.wrikeProfServices+sg.wrikeMigration:0)+skus;tC+=c;tB+=b;npvS+=(b-c)/Math.pow(1+dr,y);
      }
      return{...sc,npv:npvS,roi:tC>0?(tB-tC)/tC:0};
    });
  },[drivers,g,scenarios]);

  const el=drivers.filter(d=>d.enabled);
  const maxLev=el.length>0?Math.max(...el.map(d=>model.lt[d.id]||0),model.lt._l4||0,model.lt._fte||0):Math.max(model.lt._l4||1,model.lt._fte||0);
  const TC={drivers:"#8b5cf6",inaction:"#dc2626",yearly:"#3b82f6",sensitivity:"#f59e0b"};
  const tabs=[{id:"drivers",label:"Value Drivers"},{id:"inaction",label:"Cost of Inaction"},{id:"yearly",label:"Year-by-Year"}];

  return(
    <div style={{fontFamily:"'DM Sans',sans-serif",background:"#fff",minHeight:"100vh",color:"#1e293b"}}>
      <div style={{background:"linear-gradient(135deg,#0f172a 0%,#1e3a5f 50%,#0f4c75 100%)",padding:"18px 24px 12px",color:"white",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <div style={{width:30,height:30,borderRadius:6,background:"linear-gradient(135deg,#3b82f6,#06b6d4)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:15,fontWeight:800}}>W</div>
          <div><div style={{fontSize:16,fontWeight:800,letterSpacing:"-0.02em"}}>Wrike Value Model{g.customerName?` — ${g.customerName}`:""}</div>
            <div style={{fontSize:10,color:"#94a3b8"}}>{g.horizon}-Year Projection</div></div>
        </div>
        <div style={{display:"flex",gap:6}}>

                  <td style={{padding:"5px 10px",color:"#334155",borderBottom:"1px solid #f1f5f9"}}>Additional FTEs for Growth</td>
                  {model.years.map(y=>(<td key={y.year} style={{padding:"5px 10px",textAlign:"right",fontFamily:"'JetBrains Mono',monospace",borderBottom:"1px solid #f1f5f9",color:"#dc2626"}}>{fmt(y.coiFTE)}</td>))}
                  <td style={{padding:"5px 10px",textAlign:"right",fontFamily:"'JetBrains Mono',monospace",fontWeight:700,borderBottom:"1px solid #f1f5f9",borderLeft:"2px solid #fecaca",color:"#991b1b"}}>{fmt(model.years.reduce((a,y)=>a+y.coiFTE,0))}</td>
                </tr>
                {/* TOTAL */}
                <tr style={{background:"#fef2f2"}}>
                  <td style={{padding:"5px 10px",fontWeight:700,color:"#991b1b",borderBottom:"1px solid #f1f5f9"}}>TOTAL COST OF INACTION</td>
                  {model.years.map(y=>(<td key={y.year} style={{padding:"5px 10px",textAlign:"right",fontFamily:"'JetBrains Mono',monospace",fontWeight:700,borderBottom:"1px solid #f1f5f9",color:"#dc2626"}}>{fmt(y.coiTotal)}</td>))}
                  <td style={{padding:"5px 10px",textAlign:"right",fontFamily:"'JetBrains Mono',monospace",fontWeight:700,borderBottom:"1px solid #f1f5f9",borderLeft:"2px solid #fecaca",color:"#991b1b"}}>{fmt(model.years.reduce((a,y)=>a+y.coiTotal,0))}</td>
                </tr>
              </tbody>
            </table>
            <div style={{marginTop:14,background:"#f8fafc",borderRadius:8,padding:14,border:"1px solid #e2e8f0"}}>
              <div style={{fontSize:12,fontWeight:700,marginBottom:4}}>The Bottom Line</div>
              <div style={{fontSize:12,color:"#475569",lineHeight:1.6}}>Every year {g.customerName||"you"} wait{g.customerName?"s":""}, <span style={{fontWeight:700,color:"#dc2626"}}>{fmtK(model.coiTotal/g.horizon)}</span> is lost to inefficiency, risk, and tools that aren't working. Over {g.horizon} years, that's <span style={{fontWeight:700,color:"#dc2626"}}>{fmtK(model.coiTotal)}</span> walking out the door. Wrike pays for itself in <span style={{fontWeight:700,color:"#059669"}}>{model.pbm?`${model.pbm} months`:"under a year"}</span>{" — "}after that, every dollar saved goes straight to the bottom line.</div>
            </div></>)}

          {/* YEARLY TAB */}
          {tab==="yearly"&&(<div style={{overflowX:"auto"}}>
            <table style={{width:"100%",borderCollapse:"collapse",fontSize:11}}>
              <thead><tr style={{background:"#f1f5f9"}}>
                <th style={{padding:"7px 10px",textAlign:"left",fontWeight:700,color:"#475569",borderBottom:"2px solid #cbd5e1",fontSize:10}}>Category</th>
                {model.years.map(y=><th key={y.year} style={{padding:"7px 10px",textAlign:"right",fontWeight:700,color:"#475569",borderBottom:"2px solid #cbd5e1",fontSize:10}}>Year {y.year}</th>)}
                <th style={{padding:"7px 10px",textAlign:"right",fontWeight:700,color:"#475569",borderBottom:"2px solid #cbd5e1",fontSize:10}}>Total</th>
              </tr></thead>
              <tbody>
                <tr><td colSpan={model.years.length+2} style={{padding:"8px 10px 3px",fontWeight:800,fontSize:9,color:"#dc2626",textTransform:"uppercase",borderBottom:"1px solid #e2e8f0"}}>COSTS</td></tr>
                {[{l:"Wrike Licenses",k:"wLicCost"},{l:"Prof Services",k:"wProf"},{l:"Migration",k:"wMig"},{l:"Additional SKUs",k:"wSKUs"},{l:"Total Cost",k:"totalCost",b:true}].map((row,i)=>{
                  const total=model.years.reduce((a,y)=>a+y[row.k],0);return(<tr key={`c${i}`} style={{background:row.b?"#fef2f2":"transparent"}}>
                    <td style={{padding:"4px 10px",fontWeight:row.b?700:400,color:row.b?"#dc2626":"#334155",borderBottom:"1px solid #f1f5f9",fontSize:10}}>{row.l}</td>
                    {model.years.map(y=>(<td key={y.year} style={{padding:"4px 10px",textAlign:"right",fontFamily:"'JetBrains Mono',monospace",fontSize:10,fontWeight:row.b?700:400,borderBottom:"1px solid #f1f5f9",color:"#dc2626"}}>{fmt(y[row.k])}</td>))}
                    <td style={{padding:"4px 10px",textAlign:"right",fontFamily:"'JetBrains Mono',monospace",fontSize:10,fontWeight:700,borderBottom:"1px solid #f1f5f9",borderLeft:"2px solid #e2e8f0",color:"#dc2626"}}>{fmt(total)}</td>
                  </tr>);})}
                <tr><td colSpan={model.years.length+2} style={{padding:"8px 10px 3px",fontWeight:800,fontSize:9,color:"#059669",textTransform:"uppercase",borderBottom:"1px solid #e2e8f0"}}>BENEFITS</td></tr>
                {el.map(d=>{const total=model.years.reduce((a,y)=>a+(y.lv[d.id]||0),0);return(<tr key={d.id}><td style={{padding:"4px 10px",color:"#334155",borderBottom:"1px solid #f1f5f9",fontSize:10}}>{d.name}</td>{model.years.map(y=>(<td key={y.year} style={{padding:"4px 10px",textAlign:"right",fontFamily:"'JetBrains Mono',monospace",fontSize:10,borderBottom:"1px solid #f1f5f9"}}>{fmt(y.lv[d.id]||0)}</td>))}<td style={{padding:"4px 10px",textAlign:"right",fontFamily:"'JetBrains Mono',monospace",fontSize:10,fontWeight:700,borderBottom:"1px solid #f1f5f9",borderLeft:"2px solid #e2e8f0"}}>{fmt(total)}</td></tr>);})}
                <tr><td style={{padding:"4px 10px",color:"#334155",borderBottom:"1px solid #f1f5f9",fontSize:10}}>Legacy Tool(s) Savings</td>{model.years.map(y=>(<td key={y.year} style={{padding:"4px 10px",textAlign:"right",fontFamily:"'JetBrains Mono',monospace",fontSize:10,borderBottom:"1px solid #f1f5f9"}}>{fmt(y.legacySav)}</td>))}<td style={{padding:"4px 10px",textAlign:"right",fontFamily:"'JetBrains Mono',monospace",fontSize:10,fontWeight:700,borderBottom:"1px solid #f1f5f9",borderLeft:"2px solid #e2e8f0"}}>{fmt(model.lt._l4)}</td></tr>
                <tr><td style={{padding:"4px 10px",color:"#334155",borderBottom:"1px solid #f1f5f9",fontSize:10}}>FTE Avoidance</td>{model.years.map(y=>(<td key={y.year} style={{padding:"4px 10px",textAlign:"right",fontFamily:"'JetBrains Mono',monospace",fontSize:10,borderBottom:"1px solid #f1f5f9"}}>{fmt(y.fteSav)}</td>))}<td style={{padding:"4px 10px",textAlign:"right",fontFamily:"'JetBrains Mono',monospace",fontSize:10,fontWeight:700,borderBottom:"1px solid #f1f5f9",borderLeft:"2px solid #e2e8f0"}}>{fmt(model.lt._fte)}</td></tr>
                <tr style={{background:"#f0fdf4"}}><td style={{padding:"4px 10px",fontWeight:700,color:"#059669",borderBottom:"1px solid #f1f5f9",fontSize:10}}>Total Benefit</td>{model.years.map(y=>(<td key={y.year} style={{padding:"4px 10px",textAlign:"right",fontFamily:"'JetBrains Mono',monospace",fontSize:10,fontWeight:700,borderBottom:"1px solid #f1f5f9",color:"#059669"}}>{fmt(y.totalBenefit)}</td>))}<td style={{padding:"4px 10px",textAlign:"right",fontFamily:"'JetBrains Mono',monospace",fontSize:10,fontWeight:700,borderBottom:"1px solid #f1f5f9",borderLeft:"2px solid #e2e8f0",color:"#059669"}}>{fmt(model.years.reduce((a,y)=>a+y.totalBenefit,0))}</td></tr>
                <tr><td colSpan={model.years.length+2} style={{padding:"8px 10px 3px",fontWeight:800,fontSize:9,color:"#1e3a5f",textTransform:"uppercase",borderBottom:"1px solid #e2e8f0"}}>NET</td></tr>
                {[{l:"Net Benefit",k:"net"},...(g.discountEnabled?[{l:"PV Net Benefit",k:"pvNet"}]:[])].map((row,i)=>{const total=model.years.reduce((a,y)=>a+y[row.k],0);return(<tr key={`n${i}`}><td style={{padding:"4px 10px",fontWeight:700,borderBottom:"1px solid #f1f5f9",fontSize:10}}>{row.l}</td>{model.years.map(y=>(<td key={y.year} style={{padding:"4px 10px",textAlign:"right",fontFamily:"'JetBrains Mono',monospace",fontSize:10,fontWeight:700,borderBottom:"1px solid #f1f5f9",color:y[row.k]>=0?"#059669":"#dc2626"}}>{fmt(y[row.k])}</td>))}<td style={{padding:"4px 10px",textAlign:"right",fontFamily:"'JetBrains Mono',monospace",fontSize:10,fontWeight:700,borderBottom:"1px solid #f1f5f9",borderLeft:"2px solid #e2e8f0",color:total>=0?"#059669":"#dc2626"}}>{fmt(total)}</td></tr>);})}
              </tbody>
            </table></div>)}

          
          {/* KPIs - auto-mapped from drivers */}
          <div style={{marginTop:16,background:"#f0f9ff",borderRadius:7,padding:12,border:"1px solid #bae6fd"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
              <div style={{fontSize:10,fontWeight:700,color:"#0369a1",textTransform:"uppercase"}}>Post-Implementation KPIs</div>
              {editMode&&<button onClick={()=>setKpis(p=>[...p,""])} style={{fontSize:9,color:"#3b82f6",background:"none",border:"none",cursor:"pointer",fontWeight:600}}>+ Add KPI</button>}
            </div>
            {editMode?(
              <div style={{display:"grid",gap:3}}>
                {mappedKpis.map((k,i)=>{const isFromDriver=drivers.some(d=>d.enabled&&d.kpis&&d.kpis.includes(k));const isCustom=kpis.includes(k);return(
                  <div key={i} style={{display:"flex",gap:4,alignItems:"center"}}>
                    {isFromDriver&&!isCustom?(<>
                      <span style={{fontSize:10,color:"#334155",flex:1,padding:"3px 6px",background:"#ecfdf5",borderRadius:4,border:"1px solid #bbf7d0"}}>{"•"} {k} <span style={{fontSize:8,color:"#94a3b8"}}>(auto)</span></span>
                      <button onClick={()=>setRemovedKpis(p=>({...p,[k]:true}))} style={{border:"none",background:"none",cursor:"pointer",fontSize:12,color:"#dc2626"}}>{"×"}</button>
                    </>):(<>
                      <input value={k} onChange={e=>{const a=[...kpis];const ci=kpis.indexOf(k);if(ci>=0){a[ci]=e.target.value;setKpis(a);}}} style={{flex:1,padding:"3px 6px",border:"1px solid #bae6fd",borderRadius:4,fontSize:10,outline:"none",background:"white"}}/>
                      <button onClick={()=>setKpis(kpis.filter(x=>x!==k))} style={{border:"none",background:"none",cursor:"pointer",fontSize:12,color:"#dc2626"}}>{"×"}</button>
                    </>)}
                  </div>);})}
              </div>
            ):(
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:4,fontSize:10,color:"#334155"}}>
                {mappedKpis.filter(k=>k).map((k,i)=><div key={i}>{"•"} {k}</div>)}
              </div>
            )}
          </div>
        </div>
      </div>
      {/* TOAST */}
      {toast&&<div style={{position:"fixed",bottom:24,left:"50%",transform:"translateX(-50%)",background:"#1e293b",color:"white",padding:"10px 24px",borderRadius:8,fontSize:12,fontWeight:600,boxShadow:"0 8px 24px rgba(0,0,0,0.3)",zIndex:2000,animation:"fadeIn 0.2s"}}>{toast}</div>}
      {/* MY MODELS MODAL */}
      {showModels&&<Modal onClose={()=>setShowModels(false)} wide>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
          <div style={{fontSize:16,fontWeight:700}}>My Prospect Models</div>
          <div style={{display:"flex",gap:6}}>
            <label style={{padding:"6px 12px",borderRadius:6,border:"1px solid #cbd5e1",background:"white",cursor:"pointer",fontSize:11,fontWeight:600,color:"#475569"}}>
              Import JSON <input type="file" accept=".json" onChange={importJSON} style={{display:"none"}}/>
            </label>
            <button onClick={exportJSON} style={{padding:"6px 12px",borderRadius:6,border:"1px solid #cbd5e1",background:"white",cursor:"pointer",fontSize:11,fontWeight:600,color:"#475569"}}>Export Current</button>
            <button onClick={()=>{const all=JSON.stringify(savedModels,null,2);const blob=new Blob([all],{type:"application/json"});const url=URL.createObjectURL(blob);const a=document.createElement("a");a.href=url;a.download="Wrike_All_Models_Backup.json";a.click();}} style={{padding:"6px 12px",borderRadius:6,border:"1px solid #059669",background:"#ecfdf5",cursor:"pointer",fontSize:11,fontWeight:600,color:"#059669"}}>Backup All</button>
          </div>
        </div>
        {savedModels.length===0?(<div style={{textAlign:"center",padding:"24px",color:"#94a3b8",fontSize:12}}>No saved models yet. Enter customer data and click Save.</div>):(
          <div style={{display:"grid",gap:6}}>
            {savedModels.map((m,i)=>(<div key={i} style={{display:"flex",alignItems:"center",gap:8,padding:"10px 12px",border:"1px solid #e2e8f0",borderRadius:8,background:"white"}}>
              <div style={{flex:1}}>
                <div style={{fontSize:13,fontWeight:700,color:"#1e293b"}}>{m.name}</div>
                <div style={{fontSize:10,color:"#94a3b8"}}>{m.date} • {(m.d||[]).length} drivers • {m.g?.horizon||3}yr</div>
              </div>
              <button onClick={()=>loadModel(m)} style={{padding:"6px 12px",borderRadius:6,border:"none",background:"#3b82f6",color:"white",cursor:"pointer",fontSize:11,fontWeight:600}}>Load</button>
              <button onClick={()=>{const data={...m};const blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});const url=URL.createObjectURL(blob);const a=document.createElement("a");a.href=url;a.download=`Wrike_Model_${m.name}.json`;a.click();}} style={{padding:"6px 12px",borderRadius:6,border:"1px solid #cbd5e1",background:"white",cursor:"pointer",fontSize:11,fontWeight:600,color:"#475569"}}>Export</button>
              <button onClick={()=>deleteModel(i)} style={{border:"none",background:"none",cursor:"pointer",fontSize:14,color:"#dc2626"}}>×</button>
            </div>))}
          </div>
        )}
        <div style={{marginTop:14,padding:"10px",background:"#f8fafc",borderRadius:6,border:"1px solid #e2e8f0",fontSize:10,color:"#64748b",lineHeight:1.5}}>
          <strong>How it works:</strong> Models are saved in this browser. Use Export/Import JSON to share between team members or back up to Google Drive. The Share button creates a link for prospects.</div>
      </Modal>}
      {/* SHARE MODAL */}
      {shareModal&&<Modal onClose={()=>setShareModal(false)}>
        <div style={{fontSize:16,fontWeight:700,marginBottom:8}}>Share This Model</div>
        <div style={{fontSize:11,color:"#64748b",marginBottom:12,lineHeight:1.5}}>Anyone who opens this link will see the model with all your current inputs, value drivers, and assumptions pre-loaded. They can adjust values but their changes won't affect your link.</div>
        <div style={{position:"relative",marginBottom:12}}>
          <textarea readOnly value={shareURL} style={{width:"100%",padding:"10px",border:"1px solid #cbd5e1",borderRadius:6,fontSize:10,fontFamily:"'JetBrains Mono',monospace",color:"#334155",background:"#f8fafc",outline:"none",resize:"none",height:70,boxSizing:"border-box"}} onClick={e=>e.target.select()}/>
        </div>
        <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}>
          <button onClick={()=>setShareModal(false)} style={{padding:"8px 14px",border:"1px solid #cbd5e1",borderRadius:6,background:"white",cursor:"pointer",fontSize:12,fontWeight:600,color:"#475569"}}>Close</button>
          <button onClick={()=>{navigator.clipboard.writeText(shareURL).then(()=>{const btn=document.getElementById("_cpbtn");if(btn){btn.textContent="Copied!";setTimeout(()=>btn.textContent="\uD83D\uDCCB Copy Link",2000);}});}} id="_cpbtn" style={{padding:"8px 14px",border:"none",borderRadius:6,background:"#3b82f6",color:"white",cursor:"pointer",fontSize:12,fontWeight:600}}>{"\uD83D\uDCCB"} Copy Link</button>
        </div>
      </Modal>}
      {editingDriver&&<EditDriverModal driver={editingDriver} onClose={()=>setEditingDriver(null)}
        onSave={upd=>{setDrivers(p=>p.map(d=>d.id===upd.id?upd:d));setEditingDriver(null);}}
        onDelete={()=>{setDrivers(p=>p.filter(d=>d.id!==editingDriver.id));setEditingDriver(null);}}/>}
      {showLibrary&&<DriverLibraryModal existingIds={drivers.map(d=>d.id)} onClose={()=>setShowLibrary(false)}
        onAdd={nd=>{setDrivers(p=>[...p,...nd]);const ns={};nd.forEach(d=>ns[d.id]=true);setOpenSections(p=>({...p,...ns}));setShowLibrary(false);}}/>}
      {editingScenario&&<EditScenarioModal scenario={editingScenario} drivers={drivers} globals={g} onClose={()=>setEditingScenario(null)}
        onSave={upd=>{setScenarios(p=>p.map(s=>s.id===upd.id?upd:s));setEditingScenario(null);}}
        onDelete={()=>{setScenarios(p=>p.filter(s=>s.id!==editingScenario.id));setEditingScenario(null);}}/>}
      {addingScenario&&<EditScenarioModal scenario={{id:`sc_${Date.now()}`,name:"",desc:"",enabled:true,overrides:{leverOverrides:{},globalOverrides:{},leverInputOverrides:{}}}} drivers={drivers} globals={g} onClose={()=>setAddingScenario(false)}
        onSave={newS=>{setScenarios(p=>[...p,newS]);setAddingScenario(false);}}/>}
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
