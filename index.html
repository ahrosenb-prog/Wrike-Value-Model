/* ═══ URL STATE SHARING ═══ */
function encodeState(drivers, g, kpis, removedKpis) {
  const state = { d: drivers, g, k: kpis, r: removedKpis };
  const json = JSON.stringify(state);
  try {
    // LZ-string compress then encode for URL safety (60-70% smaller than plain base64)
    return LZString.compressToEncodedURIComponent(json);
  } catch(e) {
    // Fallback to plain base64 if LZ-string unavailable
    try { return btoa(unescape(encodeURIComponent(json))); } catch(e2) { return null; }
  }
}
function decodeState(encoded) {
  try {
    // Try LZ-string first
    const json = LZString.decompressFromEncodedURIComponent(encoded);
    if (json) return JSON.parse(json);
  } catch(e) {}
  try {
    // Fallback: try legacy plain base64 (handles old shared URLs)
    const json = decodeURIComponent(escape(atob(encoded)));
    return JSON.parse(json);
  } catch(e) { return null; }
}
function getURLConfig() {
  const params = new URLSearchParams(window.location.search);
  const cfg = params.get("config");
  if (!cfg) return null;
  return decodeState(cfg);
}
function generateShareURL(drivers, g, kpis, removedKpis) {
  const encoded = encodeState(drivers, g, kpis, removedKpis);
  if (!encoded) return null;
  const base = window.location.origin + window.location.pathname;
  return base + "?config=" + encoded;
}
function getViewMode() {
  const params = new URLSearchParams(window.location.search);
  return params.get("view") === "1" || params.get("mode") === "customer";
}
function generateCustomerLink(drivers, g, kpis, removedKpis) {
  const url = generateShareURL(drivers, g, kpis, removedKpis);
  return url ? url + "&view=1" : null;
}

function calcDriver(d, hr, af) {
  if (!d.enabled) return 0; const i=d.inputs;
  switch (d.type) {
    case "time": return i.people*i.hoursPerCycle*i.cyclesPerYear*hr*i.reduction*af;
    case "incident": return i.people*i.hoursPerIncident*i.incidentsPerYear*hr*i.recapture*af;
    case "risk": return (i.costPerIncident*i.probCurrent)-(i.costPerIncident*i.probWrike);
    case "revenue": return i.annualValue*i.improvement*af;
    case "project_delay": return i.projectsPerYear*i.delayRate*i.avgDelayDays*i.dailyCostOfDelay*i.reductionRate*af;
    default: return 0;
  }
}

    else if(d.type==="revenue")formula="="+aRef["d"+di+"_annualValue"]+"*"+aRef["d"+di+"_improvement"];
    else if(d.type==="project_delay")formula="="+aRef["d"+di+"_projectsPerYear"]+"*"+aRef["d"+di+"_delayRate"]+"*"+aRef["d"+di+"_avgDelayDays"]+"*"+aRef["d"+di+"_dailyCostOfDelay"];
    if(formula){ for(let i=0;i<H;i++)sf(ws3,r,i+1,formula,S.$); }
    else { for(let i=0;i<H;i++)sc(ws3,r,i+1,Math.round(model.years[Math.min(i,model.years.length-1)].coiByDriver?model.years[Math.min(i,model.years.length-1)].coiByDriver[d.id]||0:0),S.$); }
    sf(ws3,r,tCol,"=SUM("+cn(1)+(r+1)+":"+cn(H)+(r+1)+")",S.totR);r++;
  });
  if(g.fteAvoided>0){
    sc(ws3,r,0,"Additional FTEs for Growth",S.lbl);
    for(let i=0;i<H;i++)sc(ws3,r,i+1,Math.round(model.years[Math.min(i,model.years.length-1)].coiFTE),S.$);
    sf(ws3,r,tCol,"=SUM("+cn(1)+(r+1)+":"+cn(H)+(r+1)+")",S.totR);r++;
  }
  /* Total row - highlighted */
  sc(ws3,r,0,"TOTAL COST OF INACTION",{font:{bold:true,sz:10,color:{rgb:"DC2626"},name:"Arial"},fill:{fgColor:{rgb:"FEF2F2"}}});
  for(let i=0;i<H;i++)sf(ws3,r,i+1,"=SUM("+cn(i+1)+"3:"+cn(i+1)+r+")",S.totRbg);
  sf(ws3,r,tCol,"=SUM("+cn(1)+(r+1)+":"+cn(H)+(r+1)+")",S.totRbg);r+=2;
  
  /* Bottom line — focus on total cost over horizon; table above has year-by-year breakdown */
  sc(ws3,r,0,"If you do nothing over the next "+H+" years, the total cost is $"+Math.round(model.coiTotal).toLocaleString()+".",S.bold);r++;
  sc(ws3,r,0,"Wrike pays for itself in "+(model.pbm?model.pbm+" months":"under a year")+".",{font:{bold:true,sz:10,color:{rgb:"059669"},name:"Arial"}});r++;
  
  ws3["!ref"]="A1:"+cn(tCol)+(r+1);
  XLSX.utils.book_append_sheet(wb,ws3,"Cost of Inaction");
  
  /* ═══ TAB 4: PRESALES BASELINE ═══ */
  const ws4={};r=0;

  /* Column widths: Driver | People | Hrs/Unit | Freq/Yr | Reduction% | Baseline Hrs/Yr | Goal Hrs/Yr | Hrs Saved/Yr | Annual $ Value */
  ws4["!cols"]=[{wch:32},{wch:10},{wch:13},{wch:12},{wch:14},{wch:18},{wch:16},{wch:16},{wch:16}];

  /* Header */
  for(let i=0;i<9;i++)sc(ws4,r,i,"",S.hdr);
  sc(ws4,r,0,"PRESALES AGREED BASELINE — "+( g.customerName||"Customer")+"  ·  "+H+"-Year Horizon",S.hdr);r++;
  sc(ws4,r,0,"Annual values shown at full adoption. Year 1 actuals reflect the "+g.adoptionRamp+"-month adoption ramp.",{font:{sz:9,italic:true,color:{rgb:"64748B"},name:"Arial"}});r+=2;

  /* Column header styles */
  const ch={font:{bold:true,sz:10,color:{rgb:"FFFFFF"},name:"Arial"},fill:{fgColor:{rgb:"1E3A5F"}},alignment:{horizontal:"center",wrapText:true}};
  const chL={font:{bold:true,sz:10,color:{rgb:"FFFFFF"},name:"Arial"},fill:{fgColor:{rgb:"1E3A5F"}},alignment:{horizontal:"left"}};
  const chHrs={font:{bold:true,sz:10,color:{rgb:"FFFFFF"},name:"Arial"},fill:{fgColor:{rgb:"4C1D95"}},alignment:{horizontal:"center",wrapText:true}};
  const ch$={font:{bold:true,sz:10,color:{rgb:"FFFFFF"},name:"Arial"},fill:{fgColor:{rgb:"065F46"}},alignment:{horizontal:"center",wrapText:true}};

  sc(ws4,r,0,"Value Driver",chL);
  sc(ws4,r,1,"People",ch);
  sc(ws4,r,2,"Hrs / Unit",ch);
  sc(ws4,r,3,"Units / Yr",ch);
  sc(ws4,r,4,"Reduction %",ch);
  sc(ws4,r,5,"Baseline Hrs/Yr (Today)",chHrs);
  sc(ws4,r,6,"Goal Hrs/Yr (with Wrike)",chHrs);
  sc(ws4,r,7,"Hrs Saved / Yr",chHrs);
  sc(ws4,r,8,"Annual $ Value",ch$);
  r++;

  /* Row styles */
  const cellN={font:{sz:10,name:"Arial"},numFmt:"#,##0",alignment:{horizontal:"right"}};
  const cellP={font:{sz:10,name:"Arial"},numFmt:"0%",alignment:{horizontal:"right"}};
  const cellHrs={font:{sz:10,color:{rgb:"4C1D95"},name:"Arial"},numFmt:"#,##0",alignment:{horizontal:"right"}};
  const cellHrsGoal={font:{sz:10,color:{rgb:"7C3AED"},name:"Arial"},numFmt:"#,##0",alignment:{horizontal:"right"}};
  const cellHrsSaved={font:{bold:true,sz:10,color:{rgb:"7C3AED"},name:"Arial"},numFmt:"#,##0",alignment:{horizontal:"right"}};
  const cell$={font:{bold:true,sz:10,color:{rgb:"065F46"},name:"Arial"},numFmt:"$#,##0",alignment:{horizontal:"right"}};
  const cellNA={font:{sz:10,color:{rgb:"94A3B8"},name:"Arial"},alignment:{horizontal:"center"}};
  const cellLbl=(color)=>({font:{bold:true,sz:10,color:{rgb:color.replace("#","")},name:"Arial"},fill:{fgColor:{rgb:"F8FAFC"}}});

  /* Track totals rows for SUM formulas */
  const baseHrsRows=[];
  const goalHrsRows=[];
  const savedHrsRows=[];
  const dollarRows=[];
  const firstDataRow=r;

  el.forEach((d,di)=>{
    const inp=d.inputs;
    const rowRef=r+1; // 1-based Excel row
    const dStyle=cellLbl(d.color);

    sc(ws4,r,0,d.name,dStyle);

    if(d.type==="time"){
      /* Col B: People */
      sf(ws4,r,1,"="+aRef["d"+di+"_people"],cellN);
      /* Col C: Hrs/Cycle */
      sf(ws4,r,2,"="+aRef["d"+di+"_hoursPerCycle"],cellN);
      /* Col D: Cycles/Yr */
      sf(ws4,r,3,"="+aRef["d"+di+"_cyclesPerYear"],cellN);
      /* Col E: Reduction % */
      sf(ws4,r,4,"="+aRef["d"+di+"_reduction"],cellP);
      /* Col F: Baseline Hrs/Yr = People * Hrs * Cycles (no reduction) */
      sf(ws4,r,5,"=B"+rowRef+"*C"+rowRef+"*D"+rowRef,cellHrs);
      /* Col G: Goal Hrs/Yr = Baseline * (1 - Reduction) */
      sf(ws4,r,6,"=F"+rowRef+"*(1-E"+rowRef+")",cellHrsGoal);
      /* Col H: Hrs Saved = Baseline - Goal */
      sf(ws4,r,7,"=F"+rowRef+"-G"+rowRef,cellHrsSaved);
      /* Col I: Annual $ Value = Hrs Saved * Hourly Rate */
      sf(ws4,r,8,"=H"+rowRef+"*"+aRef.hrRate,cell$);
      baseHrsRows.push(rowRef);goalHrsRows.push(rowRef);savedHrsRows.push(rowRef);dollarRows.push(rowRef);

    } else if(d.type==="incident"){
      sf(ws4,r,1,"="+aRef["d"+di+"_people"],cellN);
      sf(ws4,r,2,"="+aRef["d"+di+"_hoursPerIncident"],cellN);
      sf(ws4,r,3,"="+aRef["d"+di+"_incidentsPerYear"],cellN);
      sf(ws4,r,4,"="+aRef["d"+di+"_recapture"],cellP);
      sf(ws4,r,5,"=B"+rowRef+"*C"+rowRef+"*D"+rowRef,cellHrs);
      sf(ws4,r,6,"=F"+rowRef+"*(1-E"+rowRef+")",cellHrsGoal);
      sf(ws4,r,7,"=F"+rowRef+"-G"+rowRef,cellHrsSaved);
      sf(ws4,r,8,"=H"+rowRef+"*"+aRef.hrRate,cell$);
      baseHrsRows.push(rowRef);goalHrsRows.push(rowRef);savedHrsRows.push(rowRef);dollarRows.push(rowRef);

    } else if(d.type==="risk"){
      /* Risk: show cost per incident, current prob, wrike prob — no hours */
      sf(ws4,r,1,"="+aRef["d"+di+"_costPerIncident"],{font:{sz:10,name:"Arial"},numFmt:"$#,##0",alignment:{horizontal:"right"}});
      sc(ws4,r,2,"Current Prob →",{font:{sz:9,italic:true,color:{rgb:"94A3B8"},name:"Arial"},alignment:{horizontal:"center"}});
      sf(ws4,r,3,"="+aRef["d"+di+"_probCurrent"],cellP);
      sc(ws4,r,4,"Wrike Prob →",{font:{sz:9,italic:true,color:{rgb:"94A3B8"},name:"Arial"},alignment:{horizontal:"center"}});
      sf(ws4,r,5,"="+aRef["d"+di+"_probWrike"],cellP);
      sc(ws4,r,6,"—",cellNA);
      sc(ws4,r,7,"—",cellNA);
      sf(ws4,r,8,"=("+aRef["d"+di+"_costPerIncident"]+"*"+aRef["d"+di+"_probCurrent"]+")-("+aRef["d"+di+"_costPerIncident"]+"*"+aRef["d"+di+"_probWrike"]+")",cell$);
      dollarRows.push(rowRef);

    } else if(d.type==="revenue"){
      sc(ws4,r,1,"Value at Risk →",{font:{sz:9,italic:true,color:{rgb:"94A3B8"},name:"Arial"},alignment:{horizontal:"center"}});
      sf(ws4,r,2,"="+aRef["d"+di+"_annualValue"],{font:{sz:10,name:"Arial"},numFmt:"$#,##0",alignment:{horizontal:"right"}});
      sc(ws4,r,3,"Improvement % →",{font:{sz:9,italic:true,color:{rgb:"94A3B8"},name:"Arial"},alignment:{horizontal:"center"}});
      sf(ws4,r,4,"="+aRef["d"+di+"_improvement"],cellP);
      sc(ws4,r,5,"—",cellNA);sc(ws4,r,6,"—",cellNA);sc(ws4,r,7,"—",cellNA);
      sf(ws4,r,8,"="+aRef["d"+di+"_annualValue"]+"*"+aRef["d"+di+"_improvement"],cell$);
      dollarRows.push(rowRef);

    } else if(d.type==="project_delay"){
      /* Col B: Projects/Year */
      sf(ws4,r,1,"="+aRef["d"+di+"_projectsPerYear"],cellN);
      /* Col C: % Delayed */
      sf(ws4,r,2,"="+aRef["d"+di+"_delayRate"],cellP);
      /* Col D: Avg Days Late */
      sf(ws4,r,3,"="+aRef["d"+di+"_avgDelayDays"],cellN);
      /* Col E: Reduction % */
      sf(ws4,r,4,"="+aRef["d"+di+"_reductionRate"],cellP);
      /* Col F: Baseline delayed project-days = projects * rate * days */
      sf(ws4,r,5,"=B"+rowRef+"*C"+rowRef+"*D"+rowRef,cellHrs);
      /* Col G: Goal delayed project-days = Baseline * (1 - Reduction) */
      sf(ws4,r,6,"=F"+rowRef+"*(1-E"+rowRef+")",cellHrsGoal);
      /* Col H: Project-days saved = Baseline - Goal */
      sf(ws4,r,7,"=F"+rowRef+"-G"+rowRef,cellHrsSaved);
      /* Col I: Annual $ Value = days saved * daily cost */
      sf(ws4,r,8,"=H"+rowRef+"*"+aRef["d"+di+"_dailyCostOfDelay"],cell$);
      baseHrsRows.push(rowRef);goalHrsRows.push(rowRef);savedHrsRows.push(rowRef);dollarRows.push(rowRef);
    }
    r++;
  });

  /* Totals row */
  r++;
  const totStyle={font:{bold:true,sz:10,color:{rgb:"FFFFFF"},name:"Arial"},fill:{fgColor:{rgb:"1E3A5F"}},numFmt:"#,##0",alignment:{horizontal:"right"}};
  const totHrsStyle={font:{bold:true,sz:10,color:{rgb:"FFFFFF"},name:"Arial"},fill:{fgColor:{rgb:"4C1D95"}},numFmt:"#,##0",alignment:{horizontal:"right"}};
  const tot$Style={font:{bold:true,sz:10,color:{rgb:"FFFFFF"},name:"Arial"},fill:{fgColor:{rgb:"065F46"}},numFmt:"$#,##0",alignment:{horizontal:"right"}};
  const totLblStyle={font:{bold:true,sz:10,color:{rgb:"FFFFFF"},name:"Arial"},fill:{fgColor:{rgb:"1E3A5F"}}};
  sc(ws4,r,0,"TOTALS",totLblStyle);
  sc(ws4,r,1,"",totStyle);sc(ws4,r,2,"",totStyle);sc(ws4,r,3,"",totStyle);sc(ws4,r,4,"",totStyle);
  sf(ws4,r,5,baseHrsRows.length>0?"="+baseHrsRows.map(rx=>"F"+rx).join("+"):"=0",totHrsStyle);
  sf(ws4,r,6,goalHrsRows.length>0?"="+goalHrsRows.map(rx=>"G"+rx).join("+"):"=0",totHrsStyle);
  sf(ws4,r,7,savedHrsRows.length>0?"="+savedHrsRows.map(rx=>"H"+rx).join("+"):"=0",totHrsStyle);
  sf(ws4,r,8,dollarRows.length>0?"="+dollarRows.map(rx=>"I"+rx).join("+"):"=0",tot$Style);
  r+=2;

  /* Footer */
  sc(ws4,r,0,"Baseline = current state, no Wrike. Goal = target state after full adoption. Hrs Saved = Baseline − Goal.",{font:{sz:9,italic:true,color:{rgb:"64748B"},name:"Arial"}});r++;
  sc(ws4,r,0,"This baseline was agreed during presales. Share with Implementation and CSM to establish go-live measurement.",{font:{sz:9,italic:true,color:{rgb:"64748B"},name:"Arial"}});

  ws4["!ref"]="A1:I"+(r+1);
  XLSX.utils.book_append_sheet(wb,ws4,"Presales Baseline");
  
  XLSX.writeFile(wb,`Wrike_Value_Model${g.customerName?" - "+g.customerName:""}.xlsx`);
}

/* ── PPTX Export ── */
function exportPPTX(model, drivers, g) {
  if (typeof PptxGenJS === "undefined") { alert("PPTX export requires browser with CDN access."); return; }

  const el = drivers.filter(d => d.enabled);
  const H = g.horizon;
  const cName = g.customerName || "[CUSTOMER NAME]";
  const fmt = (n) => { const a = Math.abs(Math.round(n)); const s = a.toLocaleString("en-US"); return (n < 0 ? "-$" : "$") + s; };
  const fmtK = (n) => { const a = Math.abs(n); if (a >= 1e6) return (n<0?"-":"")+"$"+(Math.abs(n)/1e6).toFixed(1)+"M"; if (a >= 1e3) return (n<0?"-":"")+"$"+(Math.abs(n)/1e3).toFixed(0)+"K"; return (n<0?"-":"")+"$"+Math.round(Math.abs(n)); };
  const pct = (n) => (n * 100).toFixed(1) + "%";

  // Brand colors (no # prefix — PptxGenJS requirement)
  const C = {
    bg:       "121722",  // slide background
    bgCard:   "1E2D45",  // card backgrounds
    bgDark:   "0D1526",  // deeper dark
    bgMid:    "162136",  // medium dark
    bgLight:  "2A3F5C",  // lighter card
    green:    "00E05C",  // positive accent
    teal:     "37CEBA",  // secondary accent
    yellow:   "FFCF00",  // highlight accent
    red:      "EF4444",  // cost / risk
    white:    "FFFFFF",
    muted:    "A0AEC0",
    mutedDim: "6B7A99",
    border:   "2A3F5C",
  };

  const pres = new PptxGenJS();
  pres.layout = "LAYOUT_16x9"; // 10" × 5.625"
  pres.title = `Wrike Business Case — ${cName}`;
  pres.author = "Wrike Value Model";

  // ─── Helpers ─────────────────────────────────────────────────────────────

  // Add dark slide background + subtle top accent bar + footer
  function addBase(slide, accentColor) {
    const ac = accentColor || C.green;
    slide.background = { color: C.bg };
    // Top accent stripe
    slide.addShape(pres.shapes.RECTANGLE, { x: 0, y: 0, w: 10, h: 0.04, fill: { color: ac }, line: { type: "none" } });
    // Footer bar
    slide.addShape(pres.shapes.RECTANGLE, { x: 0, y: 5.45, w: 10, h: 0.175, fill: { color: C.bgDark }, line: { type: "none" } });
    // Footer text
    slide.addText("© Wrike, Inc. | Confidential", { x: 0.3, y: 5.46, w: 4, h: 0.15, fontSize: 7, color: C.mutedDim, fontFace: "Arial", valign: "middle", margin: 0 });
    // Footer Wrike wordmark (right side)
    slide.addText("wrike", { x: 8.5, y: 5.46, w: 1.2, h: 0.15, fontSize: 8, bold: true, color: C.white, fontFace: "Arial", align: "right", valign: "middle", margin: 0 });
  }

  // Slide title (top-left, clean)
  function addTitle(slide, title, subtitle) {
    slide.addText(title, { x: 0.4, y: 0.14, w: 9.2, h: 0.42, fontSize: 18, bold: true, color: C.white, fontFace: "Arial", valign: "middle", margin: 0 });
    if (subtitle) {
      slide.addText(subtitle, { x: 0.4, y: 0.56, w: 9.2, h: 0.22, fontSize: 9, color: C.muted, fontFace: "Arial", valign: "middle", margin: 0 });
    }
  }

  // KPI card: dark card with label, big value, sub-label
  function addKpiCard(slide, x, y, w, h, label, value, sub, valueColor) {
    const vc = valueColor || C.green;
    slide.addShape(pres.shapes.RECTANGLE, { x, y, w, h, fill: { color: C.bgCard }, line: { color: C.border, pt: 1 } });
    slide.addText(label, { x: x + 0.12, y: y + 0.10, w: w - 0.24, h: 0.18, fontSize: 7, color: C.muted, fontFace: "Arial", bold: true, charSpacing: 1, margin: 0 });
    slide.addText(value, { x: x + 0.12, y: y + 0.28, w: w - 0.24, h: 0.38, fontSize: 20, bold: true, color: vc, fontFace: "Arial", valign: "middle", margin: 0 });
    if (sub) {
      slide.addText(sub, { x: x + 0.12, y: y + 0.66, w: w - 0.24, h: 0.16, fontSize: 7.5, color: C.mutedDim, fontFace: "Arial", margin: 0 });
    }
  }

  // Section divider label (small caps-style label)
  function addSectionLabel(slide, x, y, w, text, color) {
    const col = color || C.teal;
    slide.addText(text.toUpperCase(), { x, y, w, h: 0.18, fontSize: 7, bold: true, color: col, fontFace: "Arial", charSpacing: 1.5, margin: 0 });
  }

  // ─── SLIDE 1: Instructions ────────────────────────────────────────────────
  {
    const s = pres.addSlide();
    s.background = { color: "2A0A0A" }; // distinct red-dark so it's obvious
    s.addShape(pres.shapes.RECTANGLE, { x: 0, y: 0, w: 10, h: 0.04, fill: { color: C.red }, line: { type: "none" } });
    s.addText("⚠  INSTRUCTIONS — DELETE THIS SLIDE BEFORE SHARING", {
      x: 0.4, y: 0.18, w: 9.2, h: 0.4, fontSize: 16, bold: true, color: C.red, fontFace: "Arial"
    });
    s.addText("Data-driven slides are pre-populated from your live model. Narrative slides contain placeholder text — customize before presenting.", {
      x: 0.4, y: 0.72, w: 9.2, h: 0.35, fontSize: 10, color: C.white, fontFace: "Arial", italic: true
    });
    const rows = [
      [{ text: "Slide", options: { bold: true, color: C.white, fill: { color: "3D0000" } } }, { text: "Title", options: { bold: true, color: C.white, fill: { color: "3D0000" } } }, { text: "Type", options: { bold: true, color: C.white, fill: { color: "3D0000" } } }, { text: "Action Needed", options: { bold: true, color: C.white, fill: { color: "3D0000" } } }],
      ["2", "Cover / Title", { text: "✓ Live Data", options: { color: C.green } }, "Verify customer name, sponsor, AE, date"],
      ["3", "Executive Summary", { text: "✓ Live Data", options: { color: C.green } }, "Add 3 current-state challenges"],
      ["4", "Existing Team Results", { text: "⊘ Optional", options: { color: C.yellow } }, "Use for expansion deals only — delete if not applicable"],
      ["5", "Current State & Challenges", "Placeholder", "Fill in pain points from discovery"],
      ["6", "Future State", "Placeholder", "Customize FTE avoidance number"],
      ["7", "Quantifying the Switch", { text: "✓ Live Data", options: { color: C.green } }, "Verify lever names match your pitch"],
      ["8", "Strategic Value Beyond ROI", "Placeholder", "Fill in revenue / retention / talent angles"],
      ["9", "Financial Summary", { text: "✓ Live Data", options: { color: C.green } }, "Ready to present — verify table values"],
      ["10", "Risks & Mitigations", { text: "⊘ Optional", options: { color: C.yellow } }, "Keep or delete based on audience"],
      ["11", "Implementation Overview", { text: "⊘ Optional", options: { color: C.yellow } }, "Keep or delete based on deal stage"],
      ["12", "Next Steps", "Placeholder", "Fill in owners and target dates"],
      ["13", "Customer Success Stories", { text: "⊘ Optional", options: { color: C.yellow } }, "Add 2 relevant references"],
      ["14", "Appendix", "Placeholder", "Review and customize sections"],
    ];
    s.addTable(rows, {
      x: 0.4, y: 1.12, w: 9.2, h: 4.15,
      border: { pt: 0.5, color: "5A1A1A" },
      colW: [0.5, 2.1, 1.4, 5.2],
      fontSize: 8, color: C.muted, fontFace: "Arial",
      rowH: 0.27,
    });
  }

  // ─── SLIDE 2: Cover ───────────────────────────────────────────────────────
  {
    const s = pres.addSlide();
    addBase(s, C.green);
    // Large background accent shape (right side)
    s.addShape(pres.shapes.RECTANGLE, { x: 6.5, y: 0.04, w: 3.5, h: 5.41, fill: { color: C.bgCard }, line: { type: "none" } });
    s.addShape(pres.shapes.RECTANGLE, { x: 6.5, y: 0.04, w: 0.04, h: 5.41, fill: { color: C.green }, line: { type: "none" } });

    // Left: main title block
    s.addText("wrike", { x: 0.4, y: 0.25, w: 2, h: 0.32, fontSize: 14, bold: true, color: C.white, fontFace: "Arial", margin: 0 });
    s.addShape(pres.shapes.RECTANGLE, { x: 0.4, y: 0.6, w: 0.3, h: 0.04, fill: { color: C.green }, line: { type: "none" } });
    s.addText(cName, { x: 0.4, y: 0.75, w: 5.8, h: 0.45, fontSize: 22, bold: true, color: C.white, fontFace: "Arial", margin: 0 });
    s.addText("Business Case for Wrike", { x: 0.4, y: 1.22, w: 5.8, h: 0.35, fontSize: 14, color: C.teal, fontFace: "Arial", margin: 0 });
    s.addText(`A ${H}-year financial analysis quantifying the ROI of adopting Wrike.`, {
      x: 0.4, y: 1.68, w: 5.7, h: 0.3, fontSize: 9, color: C.muted, fontFace: "Arial", italic: true, margin: 0
    });

    // KPI trio mid-left
    const npvVal = fmtK(model.npv);
    const roiVal = pct(model.roi);
    const pbVal  = model.pbm ? model.pbm + " mo" : "N/A";
    addKpiCard(s, 0.4, 2.1, 1.85, 0.95, "NET PRESENT VALUE", npvVal, `${H}yr @ ${pct(g.discountRate || 0.08)}`, model.npv >= 0 ? C.green : C.red);
    addKpiCard(s, 2.38, 2.1, 1.85, 0.95, "TOTAL ROI", roiVal, fmtK(model.tb) + " benefit", model.roi >= 0 ? C.teal : C.red);

    kpis4Fin.forEach((k, i) => addKpiCard(s, 0.3 + i * 2.36, 0.88, 2.2, 0.88, k.label, k.value, k.sub, k.color));

    // Year-by-year table
    addSectionLabel(s, 0.3, 1.88, 9.4, "Year-by-Year Projection");
    const yearHeaders = [{ text: "Category", options: { bold: true, color: C.white, fill: { color: C.bgLight } } }];
    model.years.forEach(y => yearHeaders.push({ text: `Year ${y.year}`, options: { bold: true, color: C.white, fill: { color: C.bgLight }, align: "right" } }));
    yearHeaders.push({ text: "Total", options: { bold: true, color: C.white, fill: { color: C.bgLight }, align: "right" } });

    const tableRows = [yearHeaders];

    // Costs section header
    tableRows.push([{ text: "COSTS", options: { bold: true, color: C.red, fill: { color: "2A1010" }, colspan: model.years.length + 2 } }]);

    const costLines = [
      { label: "Wrike Licenses", key: "wLicCost" },
      { label: "Professional Services", key: "wProf" },
      { label: "Migration", key: "wMig" },
    ].filter(r => model.years.some(y => y[r.key] > 0));

    costLines.forEach(row => {
      const total = model.years.reduce((a, y) => a + y[row.key], 0);
      const tr = [{ text: row.label, options: { color: C.muted, fill: { color: C.bgCard } } }];
      model.years.forEach(y => tr.push({ text: fmt(y[row.key]), options: { align: "right", color: C.red, fill: { color: C.bgCard } } }));
      tr.push({ text: fmt(total), options: { align: "right", bold: true, color: C.red, fill: { color: C.bgCard } } });
      tableRows.push(tr);
    });

    // SKUs
    if (g.wrikeAdditionalSKUs) {
      g.wrikeAdditionalSKUs.forEach((sku, si) => {
        const total = model.years.reduce((a, y) => a + (y.skuByLine[si]?.cost || 0), 0);
        if (total > 0) {
          const tr = [{ text: sku.name || `Add-on ${si+1}`, options: { color: C.muted, fill: { color: C.bgCard } } }];
          model.years.forEach(y => tr.push({ text: fmt(y.skuByLine[si]?.cost || 0), options: { align: "right", color: C.red, fill: { color: C.bgCard } } }));

          tableRows.push(tr);
        }

    }

    // Total cost row
    const totalCostRow = [{ text: "Total Investment", options: { bold: true, color: C.red, fill: { color: "2A1010" } } }];

    tableRows.push(totalCostRow);

    // Benefits section header
    tableRows.push([{ text: "BENEFITS", options: { bold: true, color: C.green, fill: { color: "0A2A12" }, colspan: model.years.length + 2 } }]);

    el.forEach(d => {
      const total = model.years.reduce((a, y) => a + (y.lv[d.id] || 0), 0);

    if (model.lt._l4 > 0) {
      const tr = [{ text: "Platform Consolidation", options: { color: C.muted, fill: { color: C.bgCard } } }];

  // ─── SLIDE 10: Risks & Mitigations ───────────────────────────────────────

        s.addText(r, { x: rx + 0.3, y: 2.32 + ri * 0.32, w: 4.0, h: 0.28, fontSize: 8, color: C.muted, fontFace: "Arial", margin: 0 });

      s.addText(`"${ref.quote}"`, { x: rx + 0.15, y: 3.38, w: 4.3, h: 0.6, fontSize: 8, italic: true, color: C.mutedDim, fontFace: "Arial", wrap: true, margin: 0 });
      s.addText(`— ${ref.person}`, { x: rx + 0.15, y: 4.05, w: 4.3, h: 0.18, fontSize: 7.5, color: C.mutedDim, fontFace: "Arial", margin: 0 });
    });
  }

  // ─── SLIDE 14: Appendix ───────────────────────────────────────────────────
  {
    const s = pres.addSlide();
    addBase(s, C.mutedDim);
    addTitle(s, "Appendix");

    const sections = [
      { letter: "A", title: "Value Model Assumptions", items: ["All lever inputs and formula types", "Adoption ramp methodology", `FTE fully-loaded cost basis: ${fmt(g.fteCost || 0)}/yr`, `Discount rate: ${pct(g.discountRate || 0.08)} · Horizon: ${H} years`] },

    sections.forEach((sec, i) => {
      const col = i % 2;

      s.addShape(pres.shapes.OVAL, { x: sx + 0.15, y: sy + 0.12, w: 0.36, h: 0.36, fill: { color: C.teal }, line: { type: "none" } });
      s.addText(sec.letter, { x: sx + 0.15, y: sy + 0.12, w: 0.36, h: 0.36, fontSize: 12, bold: true, color: C.bg, fontFace: "Arial", align: "center", valign: "middle", margin: 0 });
      s.addText(sec.title, { x: sx + 0.62, y: sy + 0.18, w: 3.8, h: 0.26, fontSize: 10, bold: true, color: C.white, fontFace: "Arial", margin: 0 });
      sec.items.forEach((item, ii) => {
        s.addShape(pres.shapes.OVAL, { x: sx + 0.22, y: sy + 0.62 + ii * 0.32 + 0.06, w: 0.07, h: 0.07, fill: { color: C.teal }, line: { type: "none" } });
        s.addText(item, { x: sx + 0.36, y: sy + 0.62 + ii * 0.32, w: 4.1, h: 0.28, fontSize: 7.5, color: C.muted, fontFace: "Arial", margin: 0 });
      });
    });
  }

  // ─── Write file ───────────────────────────────────────────────────────────
  const fileName = `Wrike_Business_Case${g.customerName ? "_" + g.customerName.replace(/\s+/g, "_") : ""}`;
  pres.writeFile({ fileName });
}

/* ── UI ── */
function Tip({text}){const[show,setShow]=useState(false);if(!text)return null;return(
  <span style={{position:"relative",display:"inline-block",marginLeft:5,cursor:"pointer"}} onMouseEnter={()=>setShow(true)} onMouseLeave={()=>setShow(false)} onClick={()=>setShow(!show)}>
    <span style={{display:"inline-flex",alignItems:"center",justifyContent:"center",width:15,height:15,borderRadius:"50%",background:"#e2e8f0",color:"#475569",fontSize:9,fontWeight:700}}>?</span>
    {show&&<div style={{position:"absolute",bottom:22,left:"50%",transform:"translateX(-50%)",width:260,background:"#1e293b",color:"#f1f5f9",padding:"10px 12px",borderRadius:8,fontSize:11,lineHeight:1.5,zIndex:999,boxShadow:"0 8px 24px rgba(0,0,0,0.25)",fontWeight:400,pointerEvents:"none"}}>
      <div style={{position:"absolute",bottom:-5,left:"50%",transform:"translateX(-50%) rotate(45deg)",width:10,height:10,background:"#1e293b"}}/>{text}
    </div>}
  </span>);
}
function Inp({label,value,onChange,prefix,suffix,step=1,min=0,help,placeholder}){return(
  <div style={{marginBottom:6}}>
    <div style={{display:"flex",alignItems:"center",marginBottom:2}}>
      <label style={{fontSize:10,fontWeight:600,color:"#64748b",letterSpacing:"0.02em"}}>{label}</label>{help&&<Tip text={help}/>}
    </div>
    <div style={{display:"flex",alignItems:"center",gap:3}}>
      {prefix&&<span style={{fontSize:12,color:"#475569",fontWeight:600}}>{prefix}</span>}
      <input type={placeholder?"text":"number"} value={value} onChange={e=>onChange(placeholder?e.target.value:Number(e.target.value))} step={step} min={min} placeholder={placeholder}
        style={{width:"100%",padding:"5px 8px",border:"1px solid #cbd5e1",borderRadius:5,fontSize:12,fontFamily:placeholder?"'DM Sans',sans-serif":"'JetBrains Mono',monospace",color:"#1e293b",background:"#f8fafc",outline:"none"}}
        onFocus={e=>e.target.style.borderColor="#3b82f6"} onBlur={e=>e.target.style.borderColor="#cbd5e1"}/>
      {suffix&&<span style={{fontSize:10,color:"#64748b",whiteSpace:"nowrap"}}>{suffix}</span>}
    </div>
  </div>);
}
function Sld({label,value,onChange,min,max,step=1,format="num",help}){const d=format==="pct"?pct(value):value;return(
  <div style={{marginBottom:7}}>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:2}}>
      <div style={{display:"flex",alignItems:"center"}}><label style={{fontSize:10,fontWeight:600,color:"#64748b"}}>{label}</label>{help&&<Tip text={help}/>}</div>
      <span style={{fontSize:12,fontWeight:700,color:"#1e293b",fontFamily:"'JetBrains Mono',monospace"}}>{d}</span>
    </div>

/* ══════ ERROR BOUNDARY (catches render errors so we can show them) ══════ */
class ErrorBoundary extends React.Component {
  constructor(props){super(props);this.state={hasError:false,error:null};}
  static getDerivedStateFromError(err){return{hasError:true,error:err};}
  componentDidCatch(err,info){console.error('Wrike Value Model render error:',err,info);}
  render(){
    if(this.state.hasError&&this.state.error){
      var e=this.state.error;
      return React.createElement('div',{style:{padding:24,fontFamily:'sans-serif',maxWidth:560}},

}

    const roi=tc>0?(tb-tc)/tc:0;
    let cumCost=0,cumBenefit=0,pbm=null;for(const y of years){cumCost+=y.totalCost;const monthlyBenefit=y.totalBenefit/12;for(let m=1;m<=12;m++){cumBenefit+=monthlyBenefit;if(cumBenefit>=cumCost&&!pbm)pbm=(y.year-1)*12+m;}}
    const lt={};el.forEach(d=>{lt[d.id]=years.reduce((a,y)=>a+(y.lv[d.id]||0),0);});legacyDrivers.forEach(d=>{lt[d.id]=years.reduce((a,y)=>a+((y.legacyByDriver&&y.legacyByDriver[d.id])||0)+((y.fteByDriver&&y.fteByDriver[d.id])||0),0);});lt._l4=years.reduce((a,y)=>a+y.legacySav,0);

            </label>
            <button onClick={exportJSON} style={{padding:"6px 12px",borderRadius:6,border:"1px solid #cbd5e1",background:"white",cursor:"pointer",fontSize:11,fontWeight:600,color:"#475569"}}>Export Current</button>
            <button onClick={()=>{const all=JSON.stringify(savedModels,null,2);const blob=new Blob([all],{type:"application/json"});const url=URL.createObjectURL(blob);const a=document.createElement("a");a.href=url;a.download="Wrike_All_Models_Backup.json";a.click();}} style={{padding:"6px 12px",borderRadius:6,border:"1px solid #059669",background:"#ecfdf5",cursor:"pointer",fontSize:11,fontWeight:600,color:"#059669"}}>Backup All</button>
          </div>
        </div>
        {savedModels.length===0?(<div style={{textAlign:"center",padding:"24px",color:"#94a3b8",fontSize:12}}>No saved models yet. Enter customer data and click Save.</div>):(
          <div style={{display:"grid",gap:6}}>
            {savedModels.map((m,i)=>(<div key={i} style={{display:"flex",alignItems:"center",gap:8,padding:"10px 12px",border:"1px solid #e2e8f0",borderRadius:8,background:"white"}}>
              <div style={{flex:1}}>
                <div style={{fontSize:13,fontWeight:700,color:"#1e293b"}}>{m.name}</div>
                <div style={{fontSize:10,color:"#94a3b8"}}>{m.date} • {(m.d||[]).length} drivers • {m.g?.horizon||3}yr</div>
              </div>
              <button onClick={()=>loadModel(m)} style={{padding:"6px 12px",borderRadius:6,border:"none",background:"#3b82f6",color:"white",cursor:"pointer",fontSize:11,fontWeight:600}}>Load</button>
              <button onClick={()=>{const url=generateShareURL(m.d||[],{...DEFAULT_GLOBALS,...(m.g||{})},m.k||[],m.r||{});if(url){navigator.clipboard.writeText(url).catch(()=>{});setToast("Link copied — send to prospect!");setShowModels(false);}else{setToast("Could not generate link.");}}} style={{padding:"6px 12px",borderRadius:6,border:"1px solid rgba(59,130,246,0.4)",background:"rgba(59,130,246,0.1)",color:"#3b82f6",cursor:"pointer",fontSize:11,fontWeight:600}}>Share</button>
              <button onClick={()=>{const data={...m};const blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});const url=URL.createObjectURL(blob);const a=document.createElement("a");a.href=url;a.download=`Wrike_Model_${m.name}.json`;a.click();}} style={{padding:"6px 12px",borderRadius:6,border:"1px solid #cbd5e1",background:"white",cursor:"pointer",fontSize:11,fontWeight:600,color:"#475569"}}>Export</button>
              <button onClick={()=>deleteModel(i)} style={{border:"none",background:"none",cursor:"pointer",fontSize:14,color:"#dc2626"}}>×</button>
            </div>))}
          </div>
        )}
        <div style={{marginTop:14,padding:"10px",background:"#f8fafc",borderRadius:6,border:"1px solid #e2e8f0",fontSize:10,color:"#64748b",lineHeight:1.6}}>
          <strong>Share</strong> — Generates a compressed URL (using LZ-string) you can send directly to a prospect. They open it and see your model with all inputs pre-loaded. <strong>Export JSON</strong> — Downloads the model as a file for backing up to Google Drive or handing off to another rep. <strong>Import JSON</strong> — Loads a previously exported file into this browser. <strong>Backup All</strong> — Downloads every saved model at once.</div>
      </Modal>}
      {/* SHARE MODAL */}
      {shareModal&&<Modal onClose={()=>setShareModal(false)}>
        <div style={{fontSize:16,fontWeight:700,marginBottom:8}}>Share This Model</div>
        <div style={{fontSize:11,color:"#64748b",marginBottom:12,lineHeight:1.5}}>Anyone who opens this link will see the model with all your current inputs, value drivers, and assumptions pre-loaded. They can adjust values but their changes won't affect your link.</div>
        <div style={{position:"relative",marginBottom:12}}>
          <textarea readOnly value={shareURL} style={{width:"100%",padding:"10px",border:"1px solid #cbd5e1",borderRadius:6,fontSize:10,fontFamily:"'JetBrains Mono',monospace",color:"#334155",background:"#f8fafc",outline:"none",resize:"none",height:70,boxSizing:"border-box"}} onClick={e=>e.target.select()}/>
        </div>
        <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}>
          <button onClick={()=>setShareModal(false)} style={{padding:"8px 14px",border:"1px solid #cbd5e1",borderRadius:6,background:"white",cursor:"pointer",fontSize:12,fontWeight:600,color:"#475569"}}>Close</button>
          <button onClick={()=>{navigator.clipboard.writeText(shareURL).then(()=>{const btn=document.getElementById("_cpbtn");if(btn){btn.textContent="Copied!";setTimeout(()=>btn.textContent="\uD83D\uDCCB Copy Link",2000);}});}} id="_cpbtn" style={{padding:"8px 14px",border:"none",borderRadius:6,background:"#3b82f6",color:"white",cursor:"pointer",fontSize:12,fontWeight:600}}>{"\uD83D\uDCCB"} Copy Link</button>
        </div>
      </Modal>}
      {editingDriver&&<EditDriverModal driver={editingDriver} onClose={()=>setEditingDriver(null)}
        onSave={upd=>{setDrivers(p=>p.map(d=>d.id===upd.id?{...upd,category:upd.category!==undefined?upd.category:d.category}:d));setEditingDriver(null);}}
        onDelete={()=>{setDrivers(p=>p.filter(d=>d.id!==editingDriver.id));setEditingDriver(null);}}/>}
      {showLibrary&&<DriverLibraryModal existingIds={drivers.map(d=>d.id)} onClose={()=>setShowLibrary(false)}
        onAdd={nd=>{setDrivers(p=>[...p,...nd]);const ns={};nd.forEach(d=>ns[d.id]=true);setOpenSections(p=>({...p,...ns}));setShowLibrary(false);}}/>}
      {editingScenario&&<EditScenarioModal scenario={editingScenario} drivers={drivers} globals={g} onClose={()=>setEditingScenario(null)}
        onSave={upd=>{setScenarios(p=>p.map(s=>s.id===upd.id?upd:s));setEditingScenario(null);}}
        onDelete={()=>{setScenarios(p=>p.filter(s=>s.id!==editingScenario.id));setEditingScenario(null);}}/>}
      {addingScenario&&<EditScenarioModal scenario={{id:`sc_${Date.now()}`,name:"",desc:"",enabled:true,overrides:{leverOverrides:{},globalOverrides:{},leverInputOverrides:{}}}} drivers={drivers} globals={g} onClose={()=>setAddingScenario(false)}
        onSave={newS=>{setScenarios(p=>[...p,newS]);setAddingScenario(false);}}/>}
    </div>
  );
}
try {
  var rootEl = document.getElementById('root');
  if (rootEl) ReactDOM.createRoot(rootEl).render(React.createElement(ErrorBoundary, null, React.createElement(App)));
} catch (err) {
  window._wrikeAppError = err;
  var r = document.getElementById('root');
  if (r) r.innerHTML = '<div style="padding:24px;font-family:sans-serif"><h2 style="color:#dc2626">Error</h2><pre style="background:#fef2f2;padding:12px;border-radius:6px;overflow:auto;font-size:12px">' + (err.message || String(err)) + '</pre><p style="margin-top:12px;color:#64748b">Open the browser console (F12) for more details.</p></div>';
}
</script>
</body>
</html>
