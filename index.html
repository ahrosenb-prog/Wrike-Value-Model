      return s;

    function tc(w, fill, content, align, borders) {
      return '<w:tc>' + tcPr(w, fill, borders) + para(content, align, {before:0,after:0}) + '</w:tc>';

    // ── CHART: generate Benefit vs Cost as inline SVG embedded as PNG ─────
    // We generate an HTML canvas chart as a data URL and embed in docx as image
    async function generateChartPng() {
      return new Promise(resolve => {
        /* Always match the financial model row count — do not cap with H (avoids mismatch vs tables if horizon/globals desync). */
        const years = Array.isArray(model.years) ? model.years.slice() : [];
        const n = Math.max(1, years.length);
        const benefits = years.map(y => Number(y.totalBenefit) || 0);
        const costs = years.map(y => Number(y.totalCost) || 0);
        const maxRaw = Math.max(1, ...benefits, ...costs);
        const maxVal = maxRaw * 1.18;

        const canvas = document.createElement('canvas');
        canvas.width = Math.min(1080, Math.max(720, 96 + n * 118));
        canvas.height = 460;
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = '#FFFFFF';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        const titleY = 22;
        const legendBandTop = 34;
        const legendBandH = 26;
        const topPad = legendBandTop + legendBandH + 14;
        const leftPad = 72;
        const rightPad = 28;
        const btmPad = 78;
        const chartW = canvas.width - leftPad - rightPad;
        const chartH = canvas.height - topPad - btmPad;
        const groupW = chartW / n;
        const barW = Math.min(groupW * 0.28, 50);
        const gap = barW * 0.48;
        const xFont = n >= 5 ? '11px Montserrat,Arial' : '12px Montserrat,Arial';
        const valFont = n >= 5 ? 'bold 10px Montserrat,Arial' : 'bold 11px Montserrat,Arial';

        // Title (top)
        ctx.fillStyle = '#162136'; ctx.font = 'bold 17px Montserrat,Arial'; ctx.textAlign = 'center';
        ctx.fillText('Benefit vs. Cost Analysis', canvas.width / 2, titleY);

        // Legend centered under title (above plot — avoids Word cropping / overlap with Y-axis)
        const legCx = canvas.width / 2;
        const halfW = 118;
        ctx.fillStyle = '#F8FAFC';
        ctx.fillRect(legCx - halfW - 20, legendBandTop - 2, halfW * 2 + 40, legendBandH);
        ctx.strokeStyle = '#E2E8F0';
        ctx.strokeRect(legCx - halfW - 20, legendBandTop - 2, halfW * 2 + 40, legendBandH);
        const legendY = legendBandTop + 17;
        ctx.fillStyle = '#00E05C';
        ctx.fillRect(legCx - halfW, legendY - 9, 14, 12);
        ctx.fillStyle = '#162136'; ctx.font = '12px Montserrat,Arial'; ctx.textAlign = 'left';
        ctx.fillText('Benefit', legCx - halfW + 18, legendY);
        ctx.fillStyle = '#37CEBA';
        ctx.fillRect(legCx + 12, legendY - 9, 14, 12);
        ctx.fillText('Investment', legCx + 30, legendY);

        // Grid lines
        ctx.strokeStyle = '#E2E8F0'; ctx.lineWidth = 1;
        for (let i = 0; i <= 4; i++) {
          const y = topPad + chartH - (i / 4) * chartH;
          ctx.beginPath(); ctx.moveTo(leftPad, y); ctx.lineTo(leftPad + chartW, y); ctx.stroke();
          const label = fmtK(maxVal * i / 4);
          ctx.fillStyle = '#94A3B8'; ctx.font = '12px Montserrat,Arial';
          ctx.textAlign = 'right'; ctx.fillText(label, leftPad - 8, y + 4);
        }

        // Axes
        ctx.strokeStyle = '#CBD5E1'; ctx.lineWidth = 1;
        ctx.beginPath(); ctx.moveTo(leftPad, topPad); ctx.lineTo(leftPad, topPad + chartH); ctx.lineTo(leftPad + chartW, topPad + chartH); ctx.stroke();

        years.forEach((y, i) => {
          const cx = leftPad + groupW * i + groupW / 2;

          const bH = (benefits[i] / maxVal) * chartH;
          const bX = cx - gap / 2 - barW;
          const bY = topPad + chartH - bH;
          ctx.fillStyle = '#00E05C';
          ctx.fillRect(bX, bY, barW, bH);
          ctx.fillStyle = '#065F46'; ctx.font = valFont; ctx.textAlign = 'center';
          ctx.fillText(fmtK(benefits[i]), bX + barW / 2, bY - 5);

          const cH = (costs[i] / maxVal) * chartH;
          const cX = cx + gap / 2;
          const cY = topPad + chartH - cH;
          ctx.fillStyle = '#37CEBA';
          ctx.fillRect(cX, cY, barW, cH);
          ctx.fillStyle = '#0E7490'; ctx.font = valFont;
          ctx.fillText(fmtK(costs[i]), cX + barW / 2, cY - 5);

          ctx.fillStyle = '#162136'; ctx.font = xFont; ctx.textAlign = 'center';
          ctx.fillText('Year ' + y.year, cx, topPad + chartH + 18);
        });

        // Y axis label
        ctx.save(); ctx.translate(18, topPad + chartH / 2); ctx.rotate(-Math.PI / 2);
        ctx.fillStyle = '#64748B'; ctx.font = '12px Montserrat,Arial'; ctx.textAlign = 'center';
        ctx.fillText('Amount (' + CUR + ')', 0, 0);
        ctx.restore();

        resolve(canvas.toDataURL('image/png').split(',')[1]);
      });
    }

    // ── Combined calc methodology + assumptions table ─────────────────────
    // Columns: Driver | Formula | Value/Basis (inputs)
    function calcMethodologyXml() {
      const rows = [];
      const W = [2200, 4160, 3000]; // Driver | Formula | Value & Basis
      const totalW = W[0]+W[1]+W[2]; // = 9360
      /* Header row lives in the Word template; rows here = data only (avoids double header). */

      let idx = 0;
      enabledDrivers.forEach(d => {
        const inp = d.inputs || {};
        const val = y1.lv ? (y1.lv[d.id]||0) : 0;
        const fteForD = (inp.useCustomFteCost && inp.customFteCost != null) ? Number(inp.customFteCost) : (g.fteCost || 100000);
        const fill = idx%2===0?'F1F5F9':'FFFFFF';

        let formula = '';
        let basis = '';

        switch(d.type) {
          case 'time': {
            const full = inp.people * inp.hoursPerCycle * inp.cyclesPerYear * (fteForD/2080) * inp.reduction;
            formula = inp.people+'p × '+inp.hoursPerCycle+'hrs/cycle × '+inp.cyclesPerYear+'cycles/yr × '+fmtPct(inp.reduction)+' reduction = '+fmt(full)+' full run-rate; Y1 at '+rampPct+'% ramp = '+fmt(val);
            basis = 'People: '+inp.people+' | Hrs/cycle: '+inp.hoursPerCycle+' | Cycles/yr: '+inp.cyclesPerYear+' | Reduction: '+fmtPct(inp.reduction)+' | FTE: '+fmt(fteForD)+'/yr';
            break;
          }
          case 'incident': {
            formula = inp.people+'p × '+inp.hoursPerIncident+'hrs × '+inp.incidentsPerYear+'/yr × '+fmtPct(inp.recapture)+' recovery; Y1 = '+fmt(val);
            basis = 'People: '+inp.people+' | Hrs/incident: '+inp.hoursPerIncident+' | Incidents/yr: '+inp.incidentsPerYear+' | Recovery: '+fmtPct(inp.recapture)+' | FTE: '+fmt(fteForD)+'/yr';
            break;
          }
          case 'project_delay': {
            const full = inp.projectsPerYear * inp.delayRate * inp.avgDelayDays * inp.dailyCostOfDelay * inp.reductionRate;
            formula = inp.projectsPerYear+' projects × '+fmtPct(inp.delayRate)+' delayed × '+inp.avgDelayDays+' days × '+fmt(inp.dailyCostOfDelay)+'/day × '+fmtPct(inp.reductionRate)+' reduction = '+fmt(full)+' full; Y1 = '+fmt(val);
            basis = 'Projects/yr: '+inp.projectsPerYear+' | Delay rate: '+fmtPct(inp.delayRate)+' | Avg days: '+inp.avgDelayDays+' | Daily cost: '+fmt(inp.dailyCostOfDelay)+' | Reduction: '+fmtPct(inp.reductionRate);
            break;
          }
          case 'risk': {
            formula = fmt(inp.costPerIncident)+' × ('+fmtPct(inp.probCurrent)+' − '+fmtPct(inp.probWrike)+') = '+fmt(val);
            basis = 'Cost/incident: '+fmt(inp.costPerIncident)+' | Prob w/o Wrike: '+fmtPct(inp.probCurrent)+' | Prob w/ Wrike: '+fmtPct(inp.probWrike);
            break;
          }
          case 'revenue': {
            formula = fmt(inp.annualValue)+' × '+fmtPct(inp.improvement)+'; Y1 at '+rampPct+'% = '+fmt(val);
            basis = 'Annual value: '+fmt(inp.annualValue)+' | Improvement: '+fmtPct(inp.improvement);
            break;
          }
          default:
            formula = fmt(val);
            basis = 'See model';
        }

        rows.push(tr(
          tc(W[0],fill,textRun(d.name,{bold:true,size:TABLE_FS}),'left') +
          tc(W[1],fill,textRun(formula,{size:TABLE_FS}),'left') +
          tc(W[2],fill,textRun(basis,{size:TABLE_FS}),'left')
        ));
        idx++;
      });
      return rows.join('');
    }

    // Helper: calculate column widths dynamically
    // Total table width = 9360 DXA, label col ~40%, year cols split remaining, total col slightly wider
    function calcColWidths(labelPct) {
      const totalW = 9360;
      const labelW = Math.round(totalW * labelPct);
      const remaining = totalW - labelW;
      const totalColW = Math.round(remaining * 0.28); // Total column slightly wider
      const yearColW = Math.floor((remaining - totalColW) / H);
      const widths = [labelW];
      for (let i = 0; i < H; i++) widths.push(yearColW);
      widths.push(totalColW);
      // Adjust last year col to absorb rounding
      const sum = widths.reduce((a, b) => a + b, 0);
      widths[H] += (totalW - sum);
      return widths;
    }

    // Helper: build table grid XML
    function tblGrid(widths) {
      return '<w:tblGrid>' + widths.map(w => '<w:gridCol w:w="' + w + '"/>').join('') + '</w:tblGrid>';

    // ── COI TABLE (dynamic years) ───────────────────────────────────────────
    function coiTableXml() {
      const W = calcColWidths(0.38);
      const rows = [];
      let rowIdx = 0;

      // Header row
      let hdr = '<w:tr>';
      hdr += tc(W[0], 'D6E4F0', textRun('Annual Cost', {bold:true, size:TABLE_FS, color:'162136'}), 'left');
      for (let i = 0; i < H; i++) {
        hdr += tc(W[i+1], 'D6E4F0', textRun('Year ' + (i+1), {bold:true, size:TABLE_FS, color:'162136'}), 'right');
      }
      hdr += tc(W[H+1], 'D6E4F0', textRun('Total', {bold:true, size:TABLE_FS, color:'162136'}), 'right');
      hdr += '</w:tr>';
      rows.push(hdr);

      // Legacy Tool Savings row (if applicable)
      const legacyFullCost = g.legacyFullCost || 0;
      if (legacyFullCost > 0) {
        let legRow = '<w:tr>';
        const fill = rowIdx % 2 === 0 ? 'FFFFFF' : 'F8FAFC';
        legRow += tc(W[0], fill, textRun('Legacy Tool(s) Savings', {size:TABLE_FS, color:'162136'}), 'left');
        let legTotal = 0;
        for (let i = 0; i < H; i++) {
          legTotal += legacyFullCost;
          legRow += tc(W[i+1], fill, textRun(fmt(legacyFullCost), {size:TABLE_FS, color:'162136'}), 'right');
        }
        legRow += tc(W[H+1], fill, textRun(fmt(legTotal), {bold:true, size:TABLE_FS, color:'162136'}), 'right');
        legRow += '</w:tr>';
        rows.push(legRow);
        rowIdx++;
      }

      // Per-driver COI rows (full run-rate, no adoption ramp)
      enabledDrivers.forEach(d => {
        const inp = d.inputs || {};
        const fteForD = (inp.useCustomFteCost && inp.customFteCost != null) ? Number(inp.customFteCost) : (g.fteCost || 100000);
        let annualCOI = 0;

        switch(d.type) {
          case 'time':
            annualCOI = (inp.people||0) * (inp.hoursPerCycle||0) * (inp.cyclesPerYear||0) * (fteForD/2080) * (inp.reduction||0);
            break;
          case 'incident':
            annualCOI = (inp.people||0) * (inp.hoursPerIncident||0) * (inp.incidentsPerYear||0) * (fteForD/2080) * (inp.recapture||0);
            break;
          case 'risk':
            annualCOI = (inp.costPerIncident||0) * ((inp.probCurrent||0) - (inp.probWrike||0));
            break;
          case 'revenue':
            annualCOI = (inp.annualValue||0) * (inp.improvement||0);
            break;
          case 'project_delay':
            annualCOI = (inp.projectsPerYear||0) * (inp.delayRate||0) * (inp.avgDelayDays||0) * (inp.dailyCostOfDelay||0) * (inp.reductionRate||0);
            break;
        }

        if (annualCOI > 0) {
          let dRow = '<w:tr>';
          const fill = rowIdx % 2 === 0 ? 'FFFFFF' : 'F8FAFC';
          dRow += tc(W[0], fill, textRun(d.name, {size:TABLE_FS, color:'162136'}), 'left');
          let dTotal = 0;
          for (let i = 0; i < H; i++) {
            dTotal += annualCOI;
            dRow += tc(W[i+1], fill, textRun(fmt(annualCOI), {size:TABLE_FS, color:'162136'}), 'right');
          }
          dRow += tc(W[H+1], fill, textRun(fmt(dTotal), {size:TABLE_FS, color:'162136'}), 'right');
          dRow += '</w:tr>';
          rows.push(dRow);
          rowIdx++;
        }
      });

      // TOTAL COI row
      let totRow = '<w:tr>';
      totRow += tc(W[0], 'EFF6FF', textRun('TOTAL COST OF INACTION', {bold:true, size:TABLE_FS, color:'162136'}), 'left');
      let coiGrand = 0;
      for (let i = 0; i < H; i++) {
        const y = model.years[i];
        const coiY = y ? (y.coiTotal || 0) : 0;
        coiGrand += coiY;
        totRow += tc(W[i+1], 'EFF6FF', textRun(fmt(coiY), {bold:true, size:TABLE_FS, color:'162136'}), 'right');
      }

      totRow += '</w:tr>';
      rows.push(totRow);

      return '<w:tbl>' + tblPr() + tblGrid(W) + rows.join('') + '</w:tbl>';
    }

    /* Point the Benefit-vs-Cost chart image at rIdChart (template may use rId20+, not rId8). */
    function patchBenefitChartEmbed(xml) {

    function replaceTable(xml, marker, newTable) {

        const nextClose = xml.indexOf('</w:tbl>', pos);
        if (nextClose === -1) break;
        if (nextOpen !== -1 && nextOpen < nextClose) {

    function escRe(s) {

    function mergeSplitTokenInPara(paragraph, name) {
      const full = '{{' + name + '}}';

        '</w:t></w:r>\\s*(?:<w:proofErr[^>]*/?>\\s*)*<w:r[^>]*>(?:<w:rPr>[\\s\\S]*?</w:rPr>)?<w:t';
      const variants = [];
      variants.push(['{{', name + '}}']);
      const idx = name.lastIndexOf('_');
      if (idx >= 0) {
        variants.push(['{{' + name.slice(0, idx + 1), name.slice(idx + 1) + '}}']);
      }
      let out = paragraph;
      for (const [left, right] of variants) {
        const re = new RegExp(
          '<w:r[^>]*>(?:<w:rPr>[\\s\\S]*?</w:rPr>)?<w:t([^>]*)>' +
            escRe(left) +
            betweenRuns +
            '([^>]*)>' +
            escRe(right) +
            '</w:t></w:r>',
          'g'
        );
        out = out.replace(re, (fullMatch) => {
          const openM = /^<w:r\b[^>]*>/.exec(fullMatch);
          const open = openM ? openM[0] : '<w:r>';
          const rest = fullMatch.slice(open.length);
          const rPrM = new RegExp('^((?:<w:rPr>[\\s\\S]*?</w:rPr>)?)').exec(rest);
          const rPr = rPrM ? rPrM[1] : '';
          return open + rPr + '<w:t xml:space="preserve">' + full + '</w:t></w:r>';
        });
      }
      return out;

    Object.keys(tokens)

    docXml = docXml.replace(/\{\{[A-Z_0-9]+\}\}/g, '—');

    const blob = await zip.generateAsync({

<script type="text/babel">
const { useState, useMemo, useEffect } = React;

/* ═══ URL STATE SHARING ═══ */
function encodeState(drivers, g, kpis, removedKpis) {
  const state = { d: drivers, g, k: kpis, r: removedKpis };
  const json = JSON.stringify(state);
  try {
    // LZ-string compress then encode for URL safety (60-70% smaller than plain base64)
    return LZString.compressToEncodedURIComponent(json);
  } catch(e) {
    // Fallback to plain base64 if LZ-string unavailable
    try { return btoa(unescape(encodeURIComponent(json))); } catch(e2) { return null; }
  }
}
function decodeState(encoded) {
  try {
    // Try LZ-string first
    const json = LZString.decompressFromEncodedURIComponent(encoded);
    if (json) return JSON.parse(json);
  } catch(e) {}
  try {
    // Fallback: try legacy plain base64 (handles old shared URLs)
    const json = decodeURIComponent(escape(atob(encoded)));
    return JSON.parse(json);
  } catch(e) { return null; }
}
function getURLConfig() {
  const params = new URLSearchParams(window.location.search);
  const cfg = params.get("config");
  if (!cfg) return null;
  return decodeState(cfg);
}
function generateShareURL(drivers, g, kpis, removedKpis) {
  const encoded = encodeState(drivers, g, kpis, removedKpis);
  if (!encoded) return null;
  const base = window.location.origin + window.location.pathname;
  return base + "?config=" + encoded;
}
function getViewMode() {
  const params = new URLSearchParams(window.location.search);
  return params.get("view") === "1" || params.get("mode") === "customer";
}
function generateCustomerLink(drivers, g, kpis, removedKpis) {
  const url = generateShareURL(drivers, g, kpis, removedKpis);
  return url ? url + "&view=1" : null;
}

function calcDriver(d, hr, af) {
  if (!d.enabled) return 0; const i=d.inputs;
  switch (d.type) {
    case "time": return i.people*i.hoursPerCycle*i.cyclesPerYear*hr*i.reduction*af;
    case "incident": return i.people*i.hoursPerIncident*i.incidentsPerYear*hr*i.recapture*af;
    case "risk": return (i.costPerIncident*i.probCurrent)-(i.costPerIncident*i.probWrike);
    case "revenue": return i.annualValue*i.improvement*af;
    case "project_delay": return i.projectsPerYear*i.delayRate*i.avgDelayDays*i.dailyCostOfDelay*i.reductionRate*af;
    default: return 0;
  }
}
function calcCoi(d, hr) {
  if (!d.enabled) return 0; const i=d.inputs;
  switch (d.type) {
    case "time": return i.people*i.hoursPerCycle*i.cyclesPerYear*hr;
    case "incident": return i.people*i.hoursPerIncident*i.incidentsPerYear*hr;
    case "risk": return i.costPerIncident*i.probCurrent;
    case "revenue": return i.annualValue*i.improvement;
    case "project_delay": return i.projectsPerYear*i.delayRate*i.avgDelayDays*i.dailyCostOfDelay;
    default: return 0;
  }
}
function calcDriverHours(d, af) {
  if (!d.enabled) return 0; const i=d.inputs;
  switch (d.type) {
    case "time": return i.people*i.hoursPerCycle*i.cyclesPerYear*i.reduction*af;
    case "incident": return i.people*i.hoursPerIncident*i.incidentsPerYear*i.recapture*af;
    default: return 0;
  }
}

/** Time horizon used by model, Excel, PPTX, and Word: 1–5 years (UI slider); invalid/missing → 3 */
function clampHorizonYears(h) {
  const n = Number(h);
  if (!Number.isFinite(n) || n < 1) return 3;
  return Math.max(1, Math.min(5, Math.round(n)));
}

    } else if(d.type==="risk"){

      sf(ws4,r,4,"="+aRef["d"+di+"_reductionRate"],cellP);

      sf(ws4,r,5,"=B"+rowRef+"*C"+rowRef+"*D"+rowRef,cellHrs);
      /* Col G: Goal delayed project-days = Baseline * (1 - Reduction) */

      baseHrsRows.push(rowRef);goalHrsRows.push(rowRef);savedHrsRows.push(rowRef);dollarRows.push(rowRef);
    }
    r++;

  /* Totals row */
  r++;

  ws4["!ref"]="A1:I"+(r+1);
  XLSX.utils.book_append_sheet(wb,ws4,"Presales Baseline");
  
  XLSX.writeFile(wb,`Wrike_Value_Model${g.customerName?" - "+g.customerName:""}.xlsx`);

/* ── PPTX Export ── */
function exportPPTX(model, drivers, g) {
  if (typeof PptxGenJS === "undefined") { alert("PPTX export requires browser with CDN access."); return; }

  const el = drivers.filter(d => d.enabled);
  const H = clampHorizonYears(g.horizon);
  const cName = g.customerName || "[CUSTOMER NAME]";
  const fmt = (n) => { const a = Math.abs(Math.round(n)); const s = a.toLocaleString("en-US"); return (n < 0 ? "-$" : "$") + s; };
  const fmtK = (n) => { const a = Math.abs(n); if (a >= 1e6) return (n<0?"-":"")+"$"+(Math.abs(n)/1e6).toFixed(1)+"M"; if (a >= 1e3) return (n<0?"-":"")+"$"+(Math.abs(n)/1e3).toFixed(0)+"K"; return (n<0?"-":"")+"$"+Math.round(Math.abs(n)); };
  const pct = (n) => (n * 100).toFixed(1) + "%";

  // Brand colors (no # prefix — PptxGenJS requirement)
  const C = {
    bg:       "121722",  // slide background
    bgCard:   "1E2D45",  // card backgrounds
    bgDark:   "0D1526",  // deeper dark
    bgMid:    "162136",  // medium dark
    bgLight:  "2A3F5C",  // lighter card
    green:    "00E05C",  // positive accent
    teal:     "37CEBA",  // secondary accent
    yellow:   "FFCF00",  // highlight accent
    red:      "EF4444",  // cost / risk
    white:    "FFFFFF",
    muted:    "A0AEC0",
    mutedDim: "6B7A99",
    border:   "2A3F5C",
  };

  const pres = new PptxGenJS();
  pres.layout = "LAYOUT_16x9"; // 10" × 5.625"
  pres.title = `Wrike Business Case — ${cName}`;
  pres.author = "Wrike Value Model";

  // ─── Helpers ─────────────────────────────────────────────────────────────

  // Add dark slide background + subtle top accent bar + footer
  function addBase(slide, accentColor) {
    const ac = accentColor || C.green;
    slide.background = { color: C.bg };

    slide.addShape(pres.shapes.RECTANGLE, { x: 0, y: 0, w: 10, h: 0.04, fill: { color: ac }, line: { type: "none" } });
    // Footer bar
    slide.addShape(pres.shapes.RECTANGLE, { x: 0, y: 5.45, w: 10, h: 0.175, fill: { color: C.bgDark }, line: { type: "none" } });
    // Footer text
    slide.addText("© Wrike, Inc. | Confidential", { x: 0.3, y: 5.46, w: 4, h: 0.15, fontSize: 7, color: C.mutedDim, fontFace: "Arial", valign: "middle", margin: 0 });
    // Footer Wrike wordmark (right side)
    slide.addText("wrike", { x: 8.5, y: 5.46, w: 1.2, h: 0.15, fontSize: 8, bold: true, color: C.white, fontFace: "Arial", align: "right", valign: "middle", margin: 0 });
  }

  // Slide title (top-left, clean)
  function addTitle(slide, title, subtitle) {
    slide.addText(title, { x: 0.4, y: 0.14, w: 9.2, h: 0.42, fontSize: 18, bold: true, color: C.white, fontFace: "Arial", valign: "middle", margin: 0 });
    if (subtitle) {

    }
  }

  // KPI card: dark card with label, big value, sub-label
  function addKpiCard(slide, x, y, w, h, label, value, sub, valueColor) {
    const vc = valueColor || C.green;
    slide.addShape(pres.shapes.RECTANGLE, { x, y, w, h, fill: { color: C.bgCard }, line: { color: C.border, pt: 1 } });
    slide.addText(label, { x: x + 0.12, y: y + 0.10, w: w - 0.24, h: 0.18, fontSize: 7, color: C.muted, fontFace: "Arial", bold: true, charSpacing: 1, margin: 0 });

    }

/* ── UI ── */
function Tip({text}){const[show,setShow]=useState(false);if(!text)return null;return(
  <span style={{position:"relative",display:"inline-block",marginLeft:5,cursor:"pointer"}} onMouseEnter={()=>setShow(true)} onMouseLeave={()=>setShow(false)} onClick={()=>setShow(!show)}>
    <span style={{display:"inline-flex",alignItems:"center",justifyContent:"center",width:15,height:15,borderRadius:"50%",background:"#e2e8f0",color:"#475569",fontSize:9,fontWeight:700}}>?</span>
    {show&&<div style={{position:"absolute",bottom:22,left:"50%",transform:"translateX(-50%)",width:260,background:"#1e293b",color:"#f1f5f9",padding:"10px 12px",borderRadius:8,fontSize:11,lineHeight:1.5,zIndex:999,boxShadow:"0 8px 24px rgba(0,0,0,0.25)",fontWeight:400,pointerEvents:"none"}}>
      <div style={{position:"absolute",bottom:-5,left:"50%",transform:"translateX(-50%) rotate(45deg)",width:10,height:10,background:"#1e293b"}}/>{text}
    </div>}
  </span>);
}
function Inp({label,value,onChange,prefix,suffix,step=1,min=0,help,placeholder}){return(
  <div style={{marginBottom:6}}>
    <div style={{display:"flex",alignItems:"center",marginBottom:2}}>
      <label style={{fontSize:10,fontWeight:600,color:"#64748b",letterSpacing:"0.02em"}}>{label}</label>{help&&<Tip text={help}/>}
    </div>
    <div style={{display:"flex",alignItems:"center",gap:3}}>
      {prefix&&<span style={{fontSize:12,color:"#475569",fontWeight:600}}>{prefix}</span>}
      <input type={placeholder?"text":"number"} value={value} onChange={e=>onChange(placeholder?e.target.value:Number(e.target.value))} step={step} min={min} placeholder={placeholder}
        style={{width:"100%",padding:"5px 8px",border:"1px solid #cbd5e1",borderRadius:5,fontSize:12,fontFamily:placeholder?"'DM Sans',sans-serif":"'JetBrains Mono',monospace",color:"#1e293b",background:"#f8fafc",outline:"none"}}
        onFocus={e=>e.target.style.borderColor="#3b82f6"} onBlur={e=>e.target.style.borderColor="#cbd5e1"}/>
      {suffix&&<span style={{fontSize:10,color:"#64748b",whiteSpace:"nowrap"}}>{suffix}</span>}
    </div>
  </div>);
}
function Sld({label,value,onChange,min,max,step=1,format="num",help}){const d=format==="pct"?pct(value):value;return(
  <div style={{marginBottom:7}}>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:2}}>
      <div style={{display:"flex",alignItems:"center"}}><label style={{fontSize:10,fontWeight:600,color:"#64748b"}}>{label}</label>{help&&<Tip text={help}/>}</div>
      <span style={{fontSize:12,fontWeight:700,color:"#1e293b",fontFamily:"'JetBrains Mono',monospace"}}>{d}</span>
    </div>
    <input type="range" min={min} max={max} step={step} value={value} onChange={e=>onChange(Number(e.target.value))} style={{width:"100%",accentColor:"#3b82f6",height:3}}/>
  </div>);
}
function Stat({label,value,sub,color="#1e293b",bg="#f1f5f9"}){return(
  <div style={{background:bg,borderRadius:8,padding:"10px 12px",flex:1,minWidth:115}}>
    <div style={{fontSize:9,fontWeight:700,color:"#64748b",textTransform:"uppercase",letterSpacing:"0.04em",marginBottom:3}}>{label}</div>
    <div style={{fontSize:20,fontWeight:800,color,fontFamily:"'JetBrains Mono',monospace",lineHeight:1.1}}>{value}</div>
    {sub&&<div style={{fontSize:9,color:"#94a3b8",marginTop:2}}>{sub}</div>}
  </div>);
}

/* Stable component — do not define inside DriverInputs or inputs lose focus on each keystroke. */
function IndustryBenchmarkBanner({driverId}){
  const b=INDUSTRY_BENCHMARKS[driverId];
  if(!b)return null;
  return(
    <div style={{background:"#dbeafe",border:"1px solid #7dd3fc",borderRadius:6,padding:"8px 10px",marginBottom:10,fontSize:11,fontWeight:600,color:"#0369a1"}}>
      <span>ℹ️ Industry Benchmark: {b.benchmark}</span> <span style={{fontSize:9,color:"#64748b"}}>({b.source})</span>
    </div>
  );
}

/* Top-level component so React does not remount the FTE salary input every parent render (fixes focus loss).
   Shown only for formula types "time" and "incident" (hourly FTE math). Risk / revenue / project_delay do not use this. */
function FteCostBlock({driverType,inputs,ui,globalFteCost,currency}){
  if(driverType!=="time"&&driverType!=="incident")return null;
  const i=inputs;
  const useCustomFte=i.useCustomFteCost===true;
  const defaultFte=globalFteCost!=null?globalFteCost:100000;
  const cur=currency||"$";
  return(
    <div style={{marginTop:10,padding:"8px 10px",background:"#f8fafc",borderRadius:6,border:"1px solid #e2e8f0"}}>
      <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:6}}>
        <button type="button" onClick={()=>ui("useCustomFteCost")(!useCustomFte)} style={{width:34,height:18,borderRadius:9,border:"none",cursor:"pointer",position:"relative",background:useCustomFte?"#3b82f6":"#cbd5e1",flexShrink:0}}>
          <div style={{width:14,height:14,borderRadius:7,background:"white",position:"absolute",top:2,left:useCustomFte?18:2,boxShadow:"0 1px 2px rgba(0,0,0,0.2)"}}/>
        </button>
        <span style={{fontSize:10,fontWeight:600,color:"#64748b"}}>Change salary rate for this driver</span>
      </div>
      {useCustomFte&&<Inp label="Fully-Loaded FTE Cost (this driver)" value={i.customFteCost!=null?i.customFteCost:defaultFte} onChange={ui("customFteCost")} prefix={cur} suffix="/yr" help="Overrides Shared Assumptions FTE cost for this driver only."/>}
    </div>
  );
}

function DriverInputs({driver,onChange,globalFteCost,currency}){
  const ui=(f)=>(v)=>onChange({...driver,inputs:{...driver.inputs,[f]:v}});
  const i=driver.inputs,l=driver.labels||{},h=driver.helps||{};
  switch(driver.type){

/* ══════ ERROR BOUNDARY (catches render errors so we can show them) ══════ */
class ErrorBoundary extends React.Component {
  constructor(props){super(props);this.state={hasError:false,error:null};}
  static getDerivedStateFromError(err){return{hasError:true,error:err};}
  componentDidCatch(err,info){console.error('Wrike Value Model render error:',err,info);}
  render(){
    if(this.state.hasError&&this.state.error){
      var e=this.state.error;
      return React.createElement('div',{style:{padding:24,fontFamily:'sans-serif',maxWidth:560}},
        React.createElement('h2',{style:{color:'#dc2626',marginBottom:8}},'Something went wrong'),
        React.createElement('pre',{style:{background:'#fef2f2',padding:12,borderRadius:6,overflow:'auto',fontSize:12}},(e&&e.message)||String(e)),
        React.createElement('p',{style:{marginTop:12,color:'#64748b',fontSize:13}},'Check the browser console (F12) for more details.')
      );
    }
    return this.props.children;
  }
}

  const model = useMemo(()=>{

    const roi=tc>0?(tb-tc)/tc:0;

                <div style={{fontSize:13,fontWeight:700,color:"#1e293b"}}>{m.name}</div>
                <div style={{fontSize:10,color:"#94a3b8"}}>{m.date} • {(m.d||[]).length} drivers • {m.g?.horizon||3}yr</div>
              </div>
              <button onClick={()=>loadModel(m)} style={{padding:"6px 12px",borderRadius:6,border:"none",background:"#3b82f6",color:"white",cursor:"pointer",fontSize:11,fontWeight:600}}>Load</button>
              <button onClick={()=>{const url=generateShareURL(m.d||[],{...DEFAULT_GLOBALS,...(m.g||{})},m.k||[],m.r||{});if(url){navigator.clipboard.writeText(url).catch(()=>{});setToast("Link copied — send to prospect!");setShowModels(false);}else{setToast("Could not generate link.");}}} style={{padding:"6px 12px",borderRadius:6,border:"1px solid rgba(59,130,246,0.4)",background:"rgba(59,130,246,0.1)",color:"#3b82f6",cursor:"pointer",fontSize:11,fontWeight:600}}>Share</button>
              <button onClick={()=>{const data={...m};const blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});const url=URL.createObjectURL(blob);const a=document.createElement("a");a.href=url;a.download=`Wrike_Model_${m.name}.json`;a.click();}} style={{padding:"6px 12px",borderRadius:6,border:"1px solid #cbd5e1",background:"white",cursor:"pointer",fontSize:11,fontWeight:600,color:"#475569"}}>Export</button>
              <button onClick={()=>deleteModel(i)} style={{border:"none",background:"none",cursor:"pointer",fontSize:14,color:"#dc2626"}}>×</button>
            </div>))}
          </div>
        )}
        <div style={{marginTop:14,padding:"10px",background:"#f8fafc",borderRadius:6,border:"1px solid #e2e8f0",fontSize:10,color:"#64748b",lineHeight:1.6}}>
          <strong>Share</strong> — Generates a compressed URL (using LZ-string) you can send directly to a prospect. They open it and see your model with all inputs pre-loaded. <strong>Export JSON</strong> — Downloads the model as a file for backing up to Google Drive or handing off to another rep. <strong>Import JSON</strong> — Loads a previously exported file into this browser. <strong>Backup All</strong> — Downloads every saved model at once.</div>
      </Modal>}
      {/* SHARE MODAL */}
      {shareModal&&<Modal onClose={()=>setShareModal(false)}>
        <div style={{fontSize:16,fontWeight:700,marginBottom:8}}>Share This Model</div>
        <div style={{fontSize:11,color:"#64748b",marginBottom:12,lineHeight:1.5}}>Anyone who opens this link will see the model with all your current inputs, value drivers, and assumptions pre-loaded. They can adjust values but their changes won't affect your link.</div>
        <div style={{position:"relative",marginBottom:12}}>
          <textarea readOnly value={shareURL} style={{width:"100%",padding:"10px",border:"1px solid #cbd5e1",borderRadius:6,fontSize:10,fontFamily:"'JetBrains Mono',monospace",color:"#334155",background:"#f8fafc",outline:"none",resize:"none",height:70,boxSizing:"border-box"}} onClick={e=>e.target.select()}/>
        </div>
        <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}>
          <button onClick={()=>setShareModal(false)} style={{padding:"8px 14px",border:"1px solid #cbd5e1",borderRadius:6,background:"white",cursor:"pointer",fontSize:12,fontWeight:600,color:"#475569"}}>Close</button>
          <button onClick={()=>{navigator.clipboard.writeText(shareURL).then(()=>{const btn=document.getElementById("_cpbtn");if(btn){btn.textContent="Copied!";setTimeout(()=>btn.textContent="\uD83D\uDCCB Copy Link",2000);}});}} id="_cpbtn" style={{padding:"8px 14px",border:"none",borderRadius:6,background:"#3b82f6",color:"white",cursor:"pointer",fontSize:12,fontWeight:600}}>{"\uD83D\uDCCB"} Copy Link</button>
        </div>
      </Modal>}
      {editingDriver&&<EditDriverModal driver={editingDriver} onClose={()=>setEditingDriver(null)}
        onSave={upd=>{setDrivers(p=>p.map(d=>d.id===upd.id?{...upd,category:upd.category!==undefined?upd.category:d.category}:d));setEditingDriver(null);}}
        onDelete={()=>{setDrivers(p=>p.filter(d=>d.id!==editingDriver.id));setEditingDriver(null);}}/>}
      {showLibrary&&<DriverLibraryModal existingIds={drivers.map(d=>d.id)} onClose={()=>setShowLibrary(false)}
        onAdd={nd=>{setDrivers(p=>[...p,...nd]);const ns={};nd.forEach(d=>ns[d.id]=true);setOpenSections(p=>({...p,...ns}));setShowLibrary(false);}}/>}
      {editingScenario&&<EditScenarioModal scenario={editingScenario} drivers={drivers} globals={g} onClose={()=>setEditingScenario(null)}
        onSave={upd=>{setScenarios(p=>p.map(s=>s.id===upd.id?upd:s));setEditingScenario(null);}}
        onDelete={()=>{setScenarios(p=>p.filter(s=>s.id!==editingScenario.id));setEditingScenario(null);}}/>}
      {addingScenario&&<EditScenarioModal scenario={{id:`sc_${Date.now()}`,name:"",desc:"",enabled:true,overrides:{leverOverrides:{},globalOverrides:{},leverInputOverrides:{}}}} drivers={drivers} globals={g} onClose={()=>setAddingScenario(false)}
        onSave={newS=>{setScenarios(p=>[...p,newS]);setAddingScenario(false);}}/>}
    </div>
  );
}
try {
  var rootEl = document.getElementById('root');
  if (rootEl) ReactDOM.createRoot(rootEl).render(React.createElement(ErrorBoundary, null, React.createElement(App)));
} catch (err) {
  window._wrikeAppError = err;
  var r = document.getElementById('root');
  if (r) r.innerHTML = '<div style="padding:24px;font-family:sans-serif"><h2 style="color:#dc2626">Error</h2><pre style="background:#fef2f2;padding:12px;border-radius:6px;overflow:auto;font-size:12px">' + (err.message || String(err)) + '</pre><p style="margin-top:12px;color:#64748b">Open the browser console (F12) for more details.</p></div>';
}
</script>
</body>
</html>
